      notes: "Minimum 0:00:20, maximum 9:59:59 (see workout_limits)."
      cross_ref:
        pROWess: >
          main.py programPhase() — 0x20, 0x03, 0x00, minutes, seconds
          (0x20 = SETTWORK, 0x03 = 3 data bytes, hours=0x00, then minutes/seconds)

