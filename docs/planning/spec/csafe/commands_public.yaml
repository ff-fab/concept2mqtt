    CSAFE_SETPROGRAM_CMD:
      id: 0x24
      description: "Program the previously configured workout"
      category: "workout_setup"
      request:
        data_bytes: 2
        fields:
          - name: "program_number"
            byte: 0
            type: "uint8"
            description: "Programmed or pre-stored workout number (0 = programmed)"
          - name: "unused"
            byte: 1
            type: "uint8"
            description: "Don't care (ignored by PM)"
      response:
        data_bytes: 0
      notes: >
        When issued, all pertinent workout parameters are checked against limits.
        If any parameter violates limits, the entire workout configuration is aborted
        resulting in a PrevReject frame status. Use PM-specific GetErrorType to
        determine the specific error.
      cross_ref:
        pROWess: >
          main.py programPhase() — 0x24, 0x02, 0x00, 0x00
          (0x24 = SETPROGRAM, 0x02 = 2 data bytes, program=0x00, unused=0x00)

