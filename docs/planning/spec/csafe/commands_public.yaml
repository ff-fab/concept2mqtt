    # -----------------------------------------------------------------------
    #  PM-specific wrapper command
    # -----------------------------------------------------------------------
    CSAFE_SETUSERCFG1_CMD:
      id: 0x1A
      description: "Wrapper for one or more PM-specific commands"
      category: "pm_wrapper"
      request:
        data_bytes: variable
        fields:
          - name: "pm_commands"
            type: "bytes"
            description: >
              One or more PM-specific CSAFE commands (see commands_proprietary.yaml).
              The byte count covers all enclosed PM-specific command bytes.
      response:
        data_bytes: variable
        fields:
          - name: "pm_responses"
            type: "bytes"
            description: "PM-specific command identifier(s) and response data"
      notes: >
        This is equivalent to CSAFE_GETUSERCAPS1_CMD / CSAFE_GETUSERCAPS2_CMD from
        the public CSAFE protocol. Added for PM-specific functionality as a command
        wrapper.
      cross_ref:
        pROWess: >
          main.py programPhase() — wraps PM_SET_SPLITDURATION:
          0x1A, 0x07, 0x05, 0x05, 0x00, tsplit[0], tsplit[1], tsplit[2], tsplit[3]
          (0x1A = SETUSERCFG1, 0x07 = 7 data bytes, 0x05 = PM_SET_SPLITDURATION cmd,
          0x05 = 5 bytes of split data, 0x00 = time split type, then 4-byte LE duration)

