  # =========================================================================
  #  Long Commands (0x00-0x7F — MS bit clear, have data bytes)
  # =========================================================================
  long:

    # -----------------------------------------------------------------------
    #  Upload / auto-configuration commands
    # -----------------------------------------------------------------------
    CSAFE_AUTOUPLOAD_CMD:
      id: 0x01
      description: "Configure auto-upload behaviour"
      category: "configuration"
      request:
        data_bytes: 1
        fields:
          - name: "configuration"
            byte: 0
            type: "uint8"
            description: >
