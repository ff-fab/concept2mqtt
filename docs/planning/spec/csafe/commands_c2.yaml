  # =========================================================================
  #  SHORT SET DATA (0xD0–0xD9)
  #  Wrapper: CSAFE_SETPMDATA_CMD (0x77)
  #  These are short commands — sync data transmission.
  # =========================================================================
  short_set_data:
    description: "Short proprietary set data commands (sync)"
    wrapper: "CSAFE_SETPMDATA_CMD"
    spec_page: "68"
    commands:

      PM_SET_SYNC_DISTANCE:
        id: 0xD0
