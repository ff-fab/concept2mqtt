# Public CSAFE Commands
# Source: Concept2 PM CSAFE Communication Definition, Rev 0.25 (2023-03-23)
# Section: Command List — Public Short Commands & Public Long Commands (pp49-52)
#
# Cross-reference files:
#   - docs/planning/spec/csafe/protocol.yaml — frame format, command structure
#   - docs/planning/spec/csafe/enums.yaml — enumerated types used in responses
#   - docs/planning/spec/csafe/ble_services.yaml — BLE GATT transport layer
#
# Command ID conventions (per protocol.yaml command_format):
#   Short commands: 0x80-0xFF (MS bit set) — single command byte, no data
#   Long commands:  0x00-0x7F (MS bit clear) — command byte + byte count + data

# ===========================================================================
#  PM Public CSAFE Protocol Defaults (Table 16, p46)
# ===========================================================================
defaults:
  haveid_state_timeout:
    value_seconds: 10
    settable: true
    set_command: "CSAFE_SETTIMEOUT_CMD"
    description: >
      Delay between entering the HaveID state and transitioning back to the
      Idle state.
  inuse_inactivity_timeout:
    value_seconds: 6
    settable: false
    description: >
      Duration of inactivity during the InUse state (once workout has begun)
      before entering the Paused state.
  pause_inactivity_timeout:
    value_seconds: 220
    settable: false
    description: >
      Duration of inactivity during the Paused state before entering the
      Finished state.
  unconfigured_manual_timeout:
    value_seconds: 220
    settable: false
    description: >
      Same as Pause state timeout; occurs if a user enters MANUAL mode and
      doesn't configure a workout.
  finished_state_timeout:
    value_seconds: 220
    settable: false
    description: >
      Occurs if the workout has begun and been abandoned or was never begun.
  units_type:
    value: "metric"
    settable: false
    description: "Metric units only."
  user_id_digits:
    value: 5
    settable: true
    set_command: "CSAFE_IDDIGITS_CMD"
    range: [2, 5]
    description: "Five-digit user ID (settable via cmdIDDigits from 2-5 digits)."
  user_id:
    value: "00000"
    settable: true
    description: "Default user ID value."
  autoupload_byte:
    value: 0x10
    settable: false
    description: >
      flgAutoStatus: Disabled (cannot be changed).
      flgUpStatus: Disabled (cannot be changed).
      flgUpList: Disabled (cannot be changed).
      flgAck: Enabled (cannot be changed).
      flgExternControl: Disabled (cannot be changed).
  serial_number_digits:
    value: 9
    settable: false
    description: "Number of digits in serial number response."
  pm_specific_commands:
    value: "all_states"
    description: "PM-specific commands are accessible in all slave states."

# ===========================================================================
#  Unsupported Features (Table 17, p47)
# ===========================================================================
unsupported:
  autostatus_enable:
    description: "No unsolicited status uploads."
  uplist_enable:
    description: "No unsolicited command list uploads."
  ack_disable:
    description: "All commands will be responded to by at least a status byte."
  text_messaging:
    description: "No text messaging functions."
  set_user_information:
    description: "Not setting user weight, age and gender."
  get_user_information:
    description: "User weight is fixed at 175 lbs, age and gender not supported."
  finished_state_timeout:
    description: >
      No Finished state timeout causes a transition back to Idle; when a user
      hits MENU/BACK to conclude viewing a finished workout result or terminate
      a workout in progress, the Ready state is entered instead of the Idle
      state.  A Finished state timeout returns to the Ready state.
  paused_state_timeout:
    description: >
      A timeout is employed to enter the Finished state in the event a
      configured workout is never started or re-started.
  manual_state_timeout:
    description: >
      A timeout is employed to return to the Idle state in the event a manual
      user ID override is performed and a workout is never configured.
  inuse_state_entry:
    description: >
      In addition to allowing entry into the InUse state from the Idle and
      HaveID states, entry from the Ready state is also allowed.
  set_calories_goal:
    description: >
      Since the PM allows the user to select display units (time/meters, watts,
      or calories), setting the workout goal using power is sufficient to define
      a target pace for the pace boat display for all display units.

# ===========================================================================
#  Programmed Workout Parameter Limits (Tables 18-19, p48)
# ===========================================================================
workout_limits:
  pm3_pm4:
    source: "Table 18"
    settwork:
      command: "CSAFE_SETTWORK_CMD"
      description: "Workout time goal"
      minimum: "0:00:20"
      maximum: "9:59:59"
    sethorizontal:
      command: "CSAFE_SETHORIZONTAL_CMD"
      description: "Horizontal distance goal"
      minimum_meters: 100
      maximum_meters: 50000
    set_splitduration:
      command: "CSAFE_PM_SET_SPLITDURATION"
      description: "Time/distance split duration"
      minimum: "0:00:20 or 100m"
      maximum: "Cannot exceed workout time/distance goal"
      max_splits: 30
      notes:
        - "Minimum split duration must not cause total splits to exceed 30."
        - "Maximum split duration cannot exceed the workout time or distance goal."
  pm5:
    source: "Table 19"
    settwork:
      command: "CSAFE_SETTWORK_CMD"
      description: "Workout time goal"
      minimum: "0:00:20"
      maximum: "9:59:59"
    sethorizontal:
      command: "CSAFE_SETHORIZONTAL_CMD"
      description: "Horizontal distance goal"
      minimum_meters: 100
      maximum_meters: 50000
      maximum_meters_bikeerg: 100000
    set_splitduration:
      command: "CSAFE_PM_SET_SPLITDURATION"
      description: "Time/distance split duration"
      minimum: "0:00:20 or 100m"
      maximum: "Cannot exceed workout time/distance goal"
      max_splits: 50
      notes:
        - "Minimum split duration must not cause total splits to exceed 50."
        - "Maximum split duration cannot exceed the workout time or distance goal."

# ===========================================================================
#  Commands
# ===========================================================================
commands:

  # =========================================================================
  #  Short Commands (0x80-0xFF — MS bit set, no data bytes)
  # =========================================================================
  short:

    # -----------------------------------------------------------------------
    #  State-transition commands (status category)
    # -----------------------------------------------------------------------
    CSAFE_GETSTATUS_CMD:
      id: 0x80
      description: "Get current machine status"
      category: "status"
      request:
        data_bytes: 0
      response:
        data_bytes: 1
        fields:
          - name: "status"
            type: "uint8"
            description: "Machine status byte (see pm_state_machine in protocol.yaml)"
      notes: "Status byte is also the first byte of every response frame."
      cross_ref:
        pROWess: "Implicit in all responses — unframeCSAFE() extracts rsp[1] as status"

    CSAFE_RESET_CMD:
      id: 0x81
      description: "Reset machine to default state"
      category: "state_transition"
      request:
        data_bytes: 0
      response:
        data_bytes: 0
        notes: "No specific response data, but the status byte will be returned."
      cross_ref: {}

    CSAFE_GOIDLE_CMD:
      id: 0x82
      description: "Transition to Idle state"
      category: "state_transition"
      request:
        data_bytes: 0
      response:
        data_bytes: 0
        notes: "No specific response data, but the status byte will be returned."
      cross_ref:
        pROWess: >
          main.py runRower() — sent at end of workout to go idle:
          frameCSAFE([0x82])

    CSAFE_GOHAVEID_CMD:
      id: 0x83
      description: "Transition to HaveID state"
      category: "state_transition"
      request:
        data_bytes: 0
      response:
        data_bytes: 0
        notes: "No specific response data, but the status byte will be returned."
      cross_ref: {}

    CSAFE_GOINUSE_CMD:
      id: 0x85
      description: "Transition to InUse state (start workout)"
      category: "state_transition"
      request:
        data_bytes: 0
      response:
        data_bytes: 0
        notes: "No specific response data, but the status byte will be returned."
      cross_ref:
        pROWess: >
          main.py programPhase() — sent as last command in workout setup
          sequence: frameCSAFE([0x87, ..., 0x85])

    CSAFE_GOFINISHED_CMD:
      id: 0x86
      description: "Transition to Finished state"
      category: "state_transition"
      request:
        data_bytes: 0
      response:
        data_bytes: 0
        notes: "No specific response data, but the status byte will be returned."
      cross_ref: {}

    CSAFE_GOREADY_CMD:
      id: 0x87
      description: "Transition to Ready state"
      category: "state_transition"
      request:
        data_bytes: 0
      response:
        data_bytes: 0
        notes: "No specific response data, but the status byte will be returned."
      cross_ref:
        pROWess: >
          main.py programPhase() — sent as first command in workout setup:
          frameCSAFE([0x87, 0x20, ...]).
          Also sent standalone in runRower(): frameCSAFE([0x87])

    CSAFE_BADID_CMD:
      id: 0x88
      description: "Signal bad ID received"
      category: "state_transition"
      request:
        data_bytes: 0
      response:
        data_bytes: 0
        notes: "No specific response data, but the status byte will be returned."
      cross_ref: {}

    # -----------------------------------------------------------------------
    #  Identification / device-info commands
    # -----------------------------------------------------------------------
    CSAFE_GETVERSION_CMD:
      id: 0x91
      description: "Get firmware/hardware version information"
      category: "identification"
      request:
        data_bytes: 0
      response:
        data_bytes: 7
        fields:
          - name: "manufacturer_id"
            byte: 0
            type: "uint8"
            description: "Manufacturer ID"
          - name: "cid"
            byte: 1
            type: "uint8"
            description: "CSAFE Implementation ID"
          - name: "model"
            byte: 2
            type: "uint8"
            description: "Model number"
          - name: "hw_version_ls"
            byte: 3
            type: "uint8"
            description: "Hardware version (least significant)"
          - name: "hw_version_ms"
            byte: 4
            type: "uint8"
            description: "Hardware version (most significant)"
          - name: "sw_version_ls"
            byte: 5
            type: "uint8"
            description: "Software version (least significant)"
          - name: "sw_version_ms"
            byte: 6
            type: "uint8"
            description: "Software version (most significant)"
      cross_ref: {}

    CSAFE_GETID_CMD:
      id: 0x92
      description: "Get user ID"
      category: "identification"
      request:
        data_bytes: 0
      response:
        data_bytes: 5
        notes: "Number of response bytes depends on # ID digits configuration (default 5)."
        fields:
          - name: "digit_0_ms"
            byte: 0
            type: "ascii"
            description: "ASCII Digit 0 (most significant)"
          - name: "digit_1"
            byte: 1
            type: "ascii"
            description: "ASCII Digit 1"
          - name: "digit_2"
            byte: 2
            type: "ascii"
            description: "ASCII Digit 2"
          - name: "digit_3"
            byte: 3
            type: "ascii"
            description: "ASCII Digit 3"
          - name: "digit_4_ls"
            byte: 4
            type: "ascii"
            description: "ASCII Digit 4 (least significant)"
      cross_ref: {}

    CSAFE_GETUNITS_CMD:
      id: 0x93
      description: "Get units type"
      category: "identification"
      request:
        data_bytes: 0
      response:
        data_bytes: 1
        fields:
          - name: "units_type"
            byte: 0
            type: "uint8"
            description: "Units type (metric only on PM)"
      cross_ref: {}

    CSAFE_GETSERIAL_CMD:
      id: 0x94
      description: "Get PM serial number"
      category: "identification"
      request:
        data_bytes: 0
      response:
        data_bytes: 9
        fields:
          - name: "serial_digits"
            bytes: [0, 8]
            type: "ascii"
            count: 9
            description: "ASCII serial number digits (MS to LS)"
      cross_ref:
        pROWess: >
          main.py decodeCSAFE() — checks rsp[1][0] == 0x94, decodes
          serial as chr() of response bytes.

    # -----------------------------------------------------------------------
    #  Not-implemented short commands (0x98-0x9F)
    # -----------------------------------------------------------------------
    CSAFE_GETLIST_CMD:
      id: 0x98
      description: "Get command list"
      category: "identification"
      implemented: false
      request:
        data_bytes: 0
      response:
        data_bytes: 0

    CSAFE_GETUTILIZATION_CMD:
      id: 0x99
      description: "Get utilization information"
      category: "identification"
      implemented: false
      request:
        data_bytes: 0
      response:
        data_bytes: 0

    CSAFE_GETMOTORCURRENT_CMD:
      id: 0x9A
      description: "Get motor current"
      category: "identification"
      implemented: false
      request:
        data_bytes: 0
      response:
        data_bytes: 0

    # -----------------------------------------------------------------------
    #  Odometer and error commands
    # -----------------------------------------------------------------------
    CSAFE_GETODOMETER_CMD:
      id: 0x9B
      description: "Get lifetime odometer distance"
      category: "identification"
      request:
        data_bytes: 0
      response:
        data_bytes: 5
        fields:
          - name: "distance_lsb"
            byte: 0
            type: "uint8"
            description: "Distance (LSB)"
          - name: "distance_1"
            byte: 1
            type: "uint8"
            description: "Distance byte 1"
          - name: "distance_2"
            byte: 2
            type: "uint8"
            description: "Distance byte 2"
          - name: "distance_msb"
            byte: 3
            type: "uint8"
            description: "Distance (MSB)"
          - name: "units_specifier"
            byte: 4
            type: "uint8"
            description: "Units specifier"
      cross_ref: {}

    CSAFE_GETERRORCODE_CMD:
      id: 0x9C
      description: "Get error code"
      category: "status"
      request:
        data_bytes: 0
      response:
        data_bytes: 3
        fields:
          - name: "error_code_lsb"
            byte: 0
            type: "uint8"
            description: "Error code (LSB)"
          - name: "error_code_1"
            byte: 1
            type: "uint8"
            description: "Error code byte 1"
          - name: "error_code_msb"
            byte: 2
            type: "uint8"
            description: "Error code (MSB)"
      cross_ref: {}

    CSAFE_GETSERVICECODE_CMD:
      id: 0x9D
      description: "Get service code"
      category: "status"
      implemented: false
      request:
        data_bytes: 0
      response:
        data_bytes: 0

    CSAFE_GETUSERCFG1_CMD:
      id: 0x9E
      description: "Get user configuration 1"
      category: "configuration"
      implemented: false
      request:
        data_bytes: 0
      response:
        data_bytes: 0

    CSAFE_GETUSERCFG2_CMD:
      id: 0x9F
      description: "Get user configuration 2"
      category: "configuration"
      implemented: false
      request:
        data_bytes: 0
      response:
        data_bytes: 0

    # -----------------------------------------------------------------------
    #  Workout data retrieval commands
    # -----------------------------------------------------------------------
    CSAFE_GETTWORK_CMD:
      id: 0xA0
      description: "Get elapsed workout time"
      category: "workout_data"
      request:
        data_bytes: 0
      response:
        data_bytes: 3
        fields:
          - name: "hours"
            byte: 0
            type: "uint8"
            description: "Hours"
          - name: "minutes"
            byte: 1
            type: "uint8"
            description: "Minutes"
          - name: "seconds"
            byte: 2
            type: "uint8"
            description: "Seconds"
      cross_ref: {}

    CSAFE_GETHORIZONTAL_CMD:
      id: 0xA1
      description: "Get horizontal distance"
      category: "workout_data"
      request:
        data_bytes: 0
      response:
        data_bytes: 3
        fields:
          - name: "distance_lsb"
            byte: 0
            type: "uint8"
            description: "Horizontal distance (LSB)"
          - name: "distance_msb"
            byte: 1
            type: "uint8"
            description: "Horizontal distance (MSB)"
          - name: "units_specifier"
            byte: 2
            type: "uint8"
            description: "Units specifier"
      cross_ref: {}

    CSAFE_GETVERTICAL_CMD:
      id: 0xA2
      description: "Get vertical distance"
      category: "workout_data"
