        fields:
          - name: "calories_lsb"
            byte: 0
            type: "uint8"
            description: "Total calories (LSB)"
          - name: "calories_msb"
            byte: 1
            type: "uint8"
            description: "Total calories (MSB)"
      cross_ref: {}

    CSAFE_GETPROGRAM_CMD:
      id: 0xA4
      description: "Get current programmed/pre-stored workout number"
      category: "workout_data"
      request:
        data_bytes: 0
      response:
        data_bytes: 1
        fields:
          - name: "program_number"
            byte: 0
            type: "uint8"
            description: "Programmed/pre-stored workout number"
      cross_ref: {}

    CSAFE_GETSPEED_CMD:
      id: 0xA5
      description: "Get speed"
      category: "workout_data"
      implemented: false
      request:
        data_bytes: 0
      response:
        data_bytes: 0

    CSAFE_GETPACE_CMD:
      id: 0xA6
      description: "Get current stroke pace"
      category: "workout_data"
      request:
        data_bytes: 0
      response:
        data_bytes: 3
        fields:
          - name: "pace_lsb"
            byte: 0
