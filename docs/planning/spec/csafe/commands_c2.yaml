      PM_SET_SYNC_TIME:
        id: 0xD3
        description: "Sync time"

      PM_SET_SYNC_SPLIT_DATA:
        id: 0xD4
        description: "Sync split data (not implemented)"
        status: "not_implemented"

      PM_SET_SYNC_ENCODER_PERIOD:
        id: 0xD5
        description: "Sync encoder period (not implemented)"
        status: "not_implemented"

      PM_SET_SYNC_VERSION_INFO:
        id: 0xD6
        description: "Sync version info (not implemented)"
        status: "not_implemented"

      PM_SET_SYNC_RACETICKTIME:
        id: 0xD7
        description: "Sync race tick time"

      PM_SET_SYNC_DATAALL:
