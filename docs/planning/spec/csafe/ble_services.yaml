  # ---------------------------------------------------------------------------
  # Multiplexed Information (aggregated notification channel)
  # ---------------------------------------------------------------------------
  multiplexed_information:
    uuid_suffix: "0x0080"
    name: "C2 Multiplexed Information"
    description: >
      Aggregated notification channel. The first byte identifies the payload
      matching one of the rowing characteristic IDs below. An ID is multiplexed
      here ONLY when its dedicated characteristic notification is NOT enabled.
      Total packet length is payload_length + 1 (for the identifier byte).
    characteristics:
      multiplexed_data:
        uuid_suffix: "0x0080"
        name: "C2 Multiplexed Information Characteristic"
        bytes: 20
        bytes_note: "Up to 20 bytes (1 identifier byte + up to 19 data bytes)"
        permissions: ["NOTIFY"]
        description: >
          Multiplexed data carrying any of the rowing characteristic payloads
          prefixed with an identification byte. See individual rowing
          characteristics for field definitions.
        multiplexed_ids:
          - "0x31"   # general_status (19 bytes)
          - "0x32"   # additional_status_1 (17 bytes)
          - "0x33"   # additional_status_2 (20 bytes)
          - "0x35"   # stroke_data (20 bytes)
          - "0x36"   # additional_stroke_data (15 bytes)
          - "0x37"   # split_interval_data (18 bytes)
          - "0x38"   # additional_split_interval_data (19 bytes)
          - "0x39"   # end_of_workout_summary (20 bytes)
          - "0x3A"   # end_of_workout_additional_summary (19 bytes)
          - "0x3B"   # heart_rate_belt_information (6 bytes)
          - "0x3C"   # end_of_workout_additional_summary_2 (10 bytes)
          - "0x3D"   # force_curve_data (variable)
          - "0x3E"   # additional_status_3 (12 bytes)
          - "0x3F"   # logged_workout (15 bytes)

  # ---------------------------------------------------------------------------
  # Heart Rate Service
  # ---------------------------------------------------------------------------
  heart_rate:
    uuid_suffix: "0x0040"
    name: "C2 PM Heart Rate Service"
    description: >
      Heart rate belt data relay. Allows apps to send HR belt information
      to the PM for display and recording.
    characteristics:
      receive:
        uuid_suffix: "0x0041"
        name: "C2 PM Heart Rate Receive Characteristic"
        bytes: 20
        permissions: ["WRITE"]
        description: >
          Heart rate data sent to PM. Supports both Bluetooth Smart and
          ANT+ HR belts. Spare bytes reserved for future use.
        firmware_versions:
          - "PM5 V172 – V199.99"
          - "PM5 V211 – V249.99"
          - "PM5 V253 – V299.99"
          - "PM5 V872 – V899.99"
          - "PM5 V911 – V949.99"
          - "PM5 V953 – V999.99"
          - "PM5 V330 – V349.99"
