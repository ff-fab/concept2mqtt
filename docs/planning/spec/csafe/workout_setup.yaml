        trailer: >
          01 01 09 — PM_SET_WORKOUTTYPE: VARIABLE_UNDEFINEDREST_INTERVAL
          05 05 80 00 00 00 00 — PM_SET_SPLITDURATION: 0m (anti-Biathlon guard)
          13 02 01 01 — PM_SET_SCREENSTATE: WORKOUT / PREPARETOROWWORKOUT
          8F — Checksum (spec shows 8F for the corrected hex)
          F2 — Stop flag
        note: >
          The PM_SET_WORKOUTTYPE (0x09 = VARIABLE_UNDEFINEDREST_INTERVAL) and
          PM_SET_SPLITDURATION (0m distance) are sent AFTER all intervals are
          configured, not with the first interval. This overrides the initial
          WORKOUTTYPE_VARIABLE_INTERVAL (0x08) sent with interval 1.

  # ---------------------------------------------------------------------------
  #  Terminate Workout
  # ---------------------------------------------------------------------------
  terminate_workout:
    description: "Terminate the current workout"
    spec_page: 88
    hex_bytes: "F1 76 04 13 02 01 02 62 F2"
    frames:
      - description: "Send terminate workout screen command"
        hex_bytes: "F1 76 04 13 02 01 02 62 F2"
        breakdown:
          - "F1: Start flag"
          - "76: CSAFE_SETPMCFG_CMD"
          - "04: Wrapper byte count (4 bytes)"
          - "13: PM_SET_SCREENSTATE"
          - "02: Command byte count"
          - "01: SCREENTYPE_WORKOUT"
          - "02: SCREENVALUEWORKOUT_TERMINATEWORKOUT"
          - "62: Checksum"
          - "F2: Stop flag"

# =============================================================================
#  Force Curve Data Collection (pp88-91)
# =============================================================================
force_curve:
  description: >
    To collect force curve data, poll PM_GET_STROKESTATE until RECOVERY_STATE
    (4) is entered, then read all available force curve data using
    PM_GET_FORCEPLOTDATA. Multiple reads may be needed — the first byte of
    the response indicates how many bytes of valid data remain.
  get_stroke_state:
    command: "PM_GET_STROKESTATE"
    command_id: 0xBF
    wrapper: "CSAFE_GETPMCFG_CMD (0x1A)"
    request_hex: "F1 1A 01 BF A4 F2"
    response_states:
      0: "WAITING_FOR_WHEEL_TO_REACH_MIN_SPEED_STATE"
      1: "WAITING_FOR_WHEEL_TO_ACCELERATE_STATE"
      2: "DRIVING_STATE"
      3: "DWELLING_AFTER_DRIVE_STATE"
      4: "RECOVERY_STATE — read force curve data now"
  get_force_plot_data:
    command: "PM_GET_FORCEPLOTDATA"
    command_id: 0x6B
    wrapper: "CSAFE_GETPMCFG_CMD (0x1A)"
    request_hex: "F1 1A 03 6B 01 14 67 F2"
    request_breakdown:
      - "1A: CSAFE_GETPMCFG_CMD (PM-specific wrapper)"
      - "03: Wrapper byte count"
      - "6B: PM_GET_FORCEPLOTDATA"
      - "01: Command byte count"
      - "14: Bytes to read (20)"
    response_format:
      - "First byte: number of valid data bytes returned"
      - "Subsequent: 16-bit little-endian force values (2 bytes each)"
      - "Trailing zeros: padding (ignore)"
    note: >
      Keep reading until the "bytes read" count returns 0 or is less than
      requested. Force values are in arbitrary units (relative force).
      Each read returns up to 20 bytes of data (10 force samples).

# =============================================================================
#  Recovery Heart Rate
# =============================================================================
recovery_heart_rate:
  description: >
    After a workout ends, the PM can display a recovery heart rate screen.
    The recovery HR is measured by taking the heart rate at workout end and
    again after a recovery period (typically 60 seconds). The PM calculates
    and displays the difference.
  monitoring:
    description: >
      Monitor WorkoutState — when it transitions to WORKOUTEND (10), the
      PM begins the recovery HR countdown if a heart rate monitor is
      connected. The recovery HR result can be read via BLE notifications
      on the rowing status characteristics.
  related_commands:
    - "PM_GET_WORKOUTSTATE — poll to detect workout end"
    - "PM_GET_RESTTIME — check recovery countdown"
  ble_notifications:
    description: >
      Smart BLE notifications on the general status and additional status
      characteristics provide automatic workout state updates, making
      polling unnecessary when using BLE.

# =============================================================================
#  Workout Parameter Limits (from commands_public.yaml, Tables 18-19)
# =============================================================================
workout_limits:
  description: "Constraints on programmed workout parameters"
  time:
    minimum: "0:00:20"
    maximum: "9:59:59"
    unit: "HH:MM:SS"
    set_command: "CSAFE_SETTWORK_CMD (0x20)"
  distance:
    minimum_meters: 100
    maximum_meters: 50000
    maximum_meters_bikeerg: 100000
    unit: "meters"
    set_command: "CSAFE_SETHORIZONTAL_CMD (0x21)"
  split_duration:
    minimum_time: "0:00:20"
    minimum_distance_meters: 100
    max_splits_pm3_pm4: 30
    max_splits_pm5: 50
    rule: "Split duration must not cause total splits to exceed the maximum"
    set_command: "PM_SET_SPLITDURATION (0x05)"
  intervals:
    max_variable_intervals_pm5: 50
    max_variable_intervals_pm3_pm4: 30
    rest_minimum_seconds: 0
    note: "Fixed interval workouts have unlimited repeats (user terminates)"

