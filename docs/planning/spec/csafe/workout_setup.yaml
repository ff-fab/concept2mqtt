        hex_bytes: >
          F1 76 45 18 01 00 01 01 08 17 01 04 03 05 80 00 00 00 64 04 02 00 00
          06 04 00 00 32 C8 14 01 01 18 01 01 17 01 03 03 05 00 00 00 2E E0 04
          02 00 00 06 04 00 00 32 C8 14 01 01 01 01 09 05 05 80 00 00 00 00 13
          02 01 01 8F F2
        intervals:
          - interval: 1
            type: "INTERVALTYPE_DISTANCERESTUNDEFINED (4)"
            work: "100m (0x00000064)"
            rest: "0:00 (undefined — 0x0000)"
            pace: "2:10 (13000 centisec = 0x000032C8)"
            commands: >
              18 01 00 — interval count 0
              01 01 08 — workout type VARIABLE_INTERVAL
              17 01 04 — interval type DISTANCERESTUNDEFINED
