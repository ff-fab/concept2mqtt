  # =========================================================================
  #  LONG GET DATA (0x68–0x78)
  #  Wrapper: CSAFE_GETPMDATA_CMD (0x7F)
  #  These are long commands — require command data to produce a response.
  # =========================================================================
  long_get_data:
    description: "Long proprietary get data commands"
    wrapper: "CSAFE_GETPMDATA_CMD"
    spec_page: "65-67"
    commands:

      PM_GET_MEMORY:
        id: 0x68
        description: >
          Read memory block (max 64 bytes).  Response always returns 65 bytes;
          first byte indicates valid byte count.
        request:
          - name: "device_type"
            bytes: 1
            type: "uint8"
            description: "Device type (0=ESRAM, 1=Ext SRAM, 2=FLASH)"
          - { name: "start_address", bytes: 4, type: "uint32_be", description: "Start address (MSB first)" }
          - { name: "block_length", bytes: 1, type: "uint8", description: "Block length (max 64)" }
        response:
          - { name: "bytes_read", bytes: 1, type: "uint8", description: "Number of valid bytes read" }
          - { name: "data", bytes: 64, type: "bytes", description: "Data read (up to 64 bytes)" }

      PM_GET_LOGCARD_MEMORY:
        id: 0x69
        description: >
          Read logcard memory block (max 64 bytes).  Response always returns
          65 bytes; first byte indicates valid byte count.
        request:
          - { name: "start_address", bytes: 4, type: "uint32_be", description: "Start address (MSB first)" }
          - { name: "block_length", bytes: 1, type: "uint8", description: "Block length (max 64)" }
        response:
          - { name: "bytes_read", bytes: 1, type: "uint8", description: "Number of valid bytes read" }
          - { name: "data", bytes: 64, type: "bytes", description: "Data read (up to 64 bytes)" }

      PM_GET_INTERNALLOGMEMORY:
        id: 0x6A
        description: >
          Read internal log memory block (max 64 bytes).  Response always
          returns 65 bytes; first byte indicates valid byte count.
        request:
          - { name: "start_address", bytes: 4, type: "uint32_be", description: "Start address (MSB first)" }
          - { name: "block_length", bytes: 1, type: "uint8", description: "Block length (max 64)" }
        response:
          - { name: "bytes_read", bytes: 1, type: "uint8", description: "Number of valid bytes read" }
          - { name: "data", bytes: 64, type: "bytes", description: "Data read (up to 64 bytes)" }

      PM_GET_FORCEPLOTDATA:
        id: 0x6B
        description: >
          Read force plot data (max 32 bytes / 16 words).  Response always
          returns 33 bytes; first byte indicates valid byte count.  Only data
          samples recorded since the last read are returned.
        request:
          - { name: "block_length", bytes: 1, type: "uint8", description: "Block length (max 32 bytes / 16 words)" }
        response:
          - { name: "bytes_read", bytes: 1, type: "uint8", description: "Number of valid bytes read" }
          - { name: "data", bytes: 32, type: "uint16_be[]", description: "Force plot data (up to 16 words, MSB first each)" }

      PM_GET_HEARTBEATDATA:
        id: 0x6C
        description: >
          Read heartbeat data (max 32 bytes / 16 words).  Response always
          returns 33 bytes; first byte indicates valid byte count.  Only data
          samples recorded since the last read are returned.
        request:
          - { name: "block_length", bytes: 1, type: "uint8", description: "Block length in bytes (max 32 bytes / 16 words)" }
        response:
          - { name: "bytes_read", bytes: 1, type: "uint8", description: "Number of valid bytes read" }
          - { name: "data", bytes: 32, type: "uint16_le[]", description: "Heartbeat data (up to 16 words, LSB first each)" }

      PM_GET_UI_EVENTS:
        id: 0x6D
        description: "Get user interface events"
        request:
          - { name: "unused", bytes: 1, type: "uint8", description: "0 (unused)" }
        response:
          - { name: "ui_events", bytes: 2, type: "uint16_be", description: "User I/F Events (MSB first)" }

      PM_GET_STROKESTATS:
        id: 0x6E
        description: "Get detailed stroke statistics"
        request:
          - { name: "unused", bytes: 1, type: "uint8", description: "0 (unused)" }
        response:
          - { name: "stroke_distance", bytes: 2, type: "uint16_be", description: "Stroke Distance (MSB first)" }
          - { name: "stroke_drive_time", bytes: 1, type: "uint8", description: "Stroke Drive Time" }
          - { name: "stroke_recovery_time", bytes: 2, type: "uint16_be", description: "Stroke Recovery Time (MSB first)" }
          - { name: "stroke_length", bytes: 1, type: "uint8", description: "Stroke Length" }
          - { name: "drive_counter", bytes: 2, type: "uint16_be", description: "Drive Counter (MSB first)" }
          - { name: "peak_drive_force", bytes: 2, type: "uint16_be", description: "Peak Drive Force (MSB first)" }
          - { name: "impulse_drive_force", bytes: 2, type: "uint16_be", description: "Impulse Drive Force (MSB first)" }
          - { name: "avg_drive_force", bytes: 2, type: "uint16_be", description: "Avg Drive Force (MSB first)" }
          - { name: "work_per_stroke", bytes: 2, type: "uint16_be", description: "Work Per Stroke (MSB first)" }

      PM_GET_DIAGLOG_RECORD_NUM:
        id: 0x70
        description: "Get diagnostic log record number by type"
        request:
          - { name: "record_type", bytes: 1, type: "uint8", description: "Record Type (Enum)" }
        response:
          - { name: "record_type", bytes: 1, type: "uint8", description: "Record Type (Enum)" }
          - { name: "record_num", bytes: 2, type: "uint16_be", description: "Record Num (MSB first)" }

      PM_GET_DIAGLOG_RECORD:
        id: 0x71
        description: "Get diagnostic log record data"
        request:
          - { name: "record_type", bytes: 1, type: "uint8", description: "Record Type (Enum)" }
          - { name: "record_index", bytes: 2, type: "uint16_be", description: "Record Index (MSB first)" }
          - { name: "record_offset_bytes", bytes: 2, type: "uint16_be", description: "Record Offset Bytes (MSB first)" }
        response:
          - { name: "record_type", bytes: 1, type: "uint8", description: "Record Type (Enum)" }
          - { name: "record_index", bytes: 2, type: "uint16_be", description: "Record Index (MSB first)" }
          - { name: "valid_record_bytes", bytes: 2, type: "uint16_be", description: "Valid Record Bytes (MSB first)" }
          - { name: "data", bytes: 68, type: "bytes", description: "Data read (up to 68 bytes)" }

      PM_GET_CURRENT_WORKOUT_HASH:
        id: 0x72
        description: "Get hash of current workout"
        request:
          - { name: "unused", bytes: 1, type: "uint8", description: "0 (unused)" }
        response:
          - { name: "hash", bytes: 8, type: "bytes", description: "Hash (MSB first, 8 bytes)" }
          - { name: "unused", bytes: 8, type: "bytes", description: "Unused (0, 8 bytes)" }

      # 0x73–0x75: Internal use
      # 0x76: Command Wrapper (CSAFE_SETPMCFG_CMD)
      # 0x77: Command Wrapper (CSAFE_SETPMDATA_CMD)

      PM_GET_GAME_SCORE:
        id: 0x78
        description: "Get game score"
        request:
          - { name: "unused", bytes: 1, type: "uint8", description: "0 (unused)" }
        response:
          - { name: "game_id", bytes: 1, type: "uint8", description: "Game ID enumeration" }
          - { name: "game_score", bytes: 2, type: "uint16_be", description: "Game Score (Fish/Darts: 1pt LSB; Target: 0.1% LSB)" }

      # 0x7E: Command Wrapper (CSAFE_GETPMCFG_CMD)
      # 0x7F: Command Wrapper (CSAFE_GETPMDATA_CMD)

  # =========================================================================
  #  SHORT SET CONFIGURATION (0xE0–0xE1)
  #  Wrapper: CSAFE_SETPMCFG_CMD (0x76)
  #  These are short commands (no command data beyond the command byte).
  # =========================================================================
  short_set_config:
    description: "Short proprietary set configuration commands"
    wrapper: "CSAFE_SETPMCFG_CMD"
    spec_page: "67"
    commands:

      PM_SET_RESET_ALL:
        id: 0xE0
