# Codecov configuration
# Docs: https://docs.codecov.io/docs/codecov-yaml

coverage:
  status:
    # Project-level: overall coverage must not drop below target
    project:
      default:
        target: auto
        threshold: 4% # Allow 4% fluctuation before failing
      rust:
        target: auto
        threshold: 4%
        flags:
          - rust
      python:
        target: auto
        threshold: 4%
        flags:
          - python

    # Patch-level: new/changed lines in a PR should have reasonable coverage
    patch:
      default:
        target: 50%

flags:
  rust:
    paths:
      - packages/csafe-codec/src/
    carryforward: true
  python:
    paths:
      - packages/concept2mqtt/src/
    carryforward: true

component_management:
  individual_components:
    - component_id: csafe-codec
      name: csafe-codec (Rust)
      paths:
        - packages/csafe-codec/src/**
    - component_id: concept2mqtt
      name: concept2mqtt (Python)
      paths:
        - packages/concept2mqtt/src/**

comment:
  layout: 'condensed_header, condensed_files, condensed_footer, components'
  behavior: default
  require_changes: true # Only comment when coverage changes
