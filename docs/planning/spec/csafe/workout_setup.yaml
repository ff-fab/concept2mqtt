    frames:
      - description: "Program 100 calorie workout with 20 cal splits"
        hex_bytes: "F1 76 18 01 01 0A 03 05 C0 00 00 00 64 05 05 C0 00 00 00 14 14 01 01 13 02 01 01 17 F2"
        breakdown:
          - "F1: Start flag"
          - "76: CSAFE_SETPMCFG_CMD"
          - "18: Wrapper byte count (24 bytes)"
          - "01: PM_SET_WORKOUTTYPE"
          - "01: Command byte count"
          - "0A: WORKOUTTYPE_FIXEDCALORIE_SPLITS"
          - "03: PM_SET_WORKOUTDURATION"
          - "05: Command byte count"
          - "C0: WORKOUT_DURATION_IDENTIFIER_CALORIES"
