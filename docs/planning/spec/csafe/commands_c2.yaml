  # =========================================================================
  #  LONG SET CONFIGURATION (0x00–0x3E)
  #  Wrapper: CSAFE_SETPMCFG_CMD (0x76) or CSAFE_SETUSERCFG1_CMD (0x1A)
  #  These are long commands — require command data.
  # =========================================================================
  long_set_config:
    description: >
      Long proprietary set configuration commands.  Key commands for workout
      programming: PM_SET_WORKOUTTYPE (0x01), PM_SET_WORKOUTDURATION (0x03),
      PM_SET_SPLITDURATION (0x05), PM_CONFIGURE_WORKOUT (0x14),
      PM_SET_INTERVALTYPE (0x17), PM_SET_WORKOUTINTERVALCOUNT (0x18),
      PM_SET_SCREENSTATE (0x13).
    wrapper: "CSAFE_SETPMCFG_CMD"
    alt_wrapper: "CSAFE_SETUSERCFG1_CMD"
    spec_page: "68-75"
    commands:

      PM_SET_BAUDRATE:
        id: 0x00
        description: "Set baud rate (not implemented)"
        status: "not_implemented"

      PM_SET_WORKOUTTYPE:
        id: 0x01
        description: "Set workout type"
        request:
          - { name: "workout_type", bytes: 1, type: "uint8", description: "Workout Type (see enums.yaml OBJ_WORKOUTTYPE_T)" }
        cross_ref:
          - "c2bluetooth commands.dart — CsafePMSetWorkoutType (0x01)"

      PM_SET_STARTTYPE:
        id: 0x02
        description: "Set start type (not implemented)"
        status: "not_implemented"

      PM_SET_WORKOUTDURATION:
        id: 0x03
        description: "Set workout duration with type indicator"
        request:
          - name: "duration_type"
            bytes: 1
            type: "uint8"
            description: >
              Time/Distance duration type:
              0x00=Time, 0x40=Calories, 0x60=Watt-Min, 0x80=Distance
          - { name: "duration", bytes: 4, type: "uint32_be", description: "Duration value (MSB first)" }
        cross_ref:
          - "c2bluetooth commands.dart — CsafePmSetWorkoutDuration (0x03)"

      PM_SET_RESTDURATION:
        id: 0x04
        description: "Set rest duration"
        request:
          - { name: "duration", bytes: 2, type: "uint16_be", description: "Duration (MSB first)" }

      PM_SET_SPLITDURATION:
        id: 0x05
        description: "Set split duration with type indicator"
        request:
          - name: "duration_type"
            bytes: 1
            type: "uint8"
            description: >
              Time/Distance duration type:
              0x00=Time, 0x40=Calories, 0x80=Distance, 0xC0=Watt-Min
          - { name: "duration", bytes: 4, type: "uint32_be", description: "Duration value (MSB first)" }
        cross_ref:
          - "c2bluetooth commands.dart — CsafePMSetSplitDuration (0x05)"
          - "pROWess/py/main.py:300 — via SETUSRCFG1 wrapper (0x1A)"

      PM_SET_TARGETPACETIME:
        id: 0x06
        description: "Set target pace time"
        request:
          - { name: "pace_time", bytes: 4, type: "uint32_be", description: "Pace Time (MSB first)" }

      PM_SET_INTERVALIDENTIFIER:
        id: 0x07
        description: "Set interval identifier (not implemented)"
        status: "not_implemented"

      PM_SET_OPERATIONALSTATE:
        id: 0x08
        description: "Set operational state (not implemented)"
        status: "not_implemented"

      PM_SET_RACETYPE:
        id: 0x09
        description: "Set race type"
        request:
          - { name: "race_type", bytes: 1, type: "uint8", description: "Type" }

      PM_SET_WARMUPDURATION:
        id: 0x0A
        description: "Set warm-up duration (not implemented)"
        status: "not_implemented"

      PM_SET_RACELANESETUP:
        id: 0x0B
        description: "Set race lane setup"
        request:
          - { name: "erg_physical_address", bytes: 1, type: "uint8", description: "Erg Physical Address" }
          - { name: "race_lane_number", bytes: 1, type: "uint8", description: "Race Lane Number" }

      PM_SET_RACELANEVERIFY:
        id: 0x0C
        description: "Verify race lane"
        request:
          - { name: "erg_physical_address", bytes: 1, type: "uint8", description: "Erg Physical Address" }
          - { name: "race_lane_number", bytes: 1, type: "uint8", description: "Race Lane Number" }

      PM_SET_RACESTARTPARAMS:
        id: 0x0D
        description: "Set race start parameters"
        request:
          - name: "start_type"
            bytes: 1
            type: "uint8"
            description: "Start Type (0=Random, 1=Countdown, 2=Random modified)"
          - { name: "count_start", bytes: 1, type: "uint8", description: "Count Start Count / Race Start State" }
          - { name: "ready_tick_count", bytes: 4, type: "uint32_be", description: "Ready Tick Count (MSB first)" }
          - { name: "attention_tick_count", bytes: 4, type: "uint32_be", description: "Attention Tick Count / Countdown Ticks Per Number (MSB first)" }
          - { name: "row_tick_count", bytes: 4, type: "uint32_be", description: "Row Tick Count (MSB first)" }

      PM_SET_ERGSLAVEDISCOVERYREQUEST:
        id: 0x0E
        description: "Set erg slave discovery request"
        request:
          - { name: "starting_erg_slave_address", bytes: 1, type: "uint8", description: "Starting Erg Slave Address" }

      PM_SET_BOATNUMBER:
        id: 0x0F
        description: "Set boat number"
        request:
          - { name: "boat_number", bytes: 1, type: "uint8", description: "Boat Number" }

      PM_SET_ERGNUMBER:
        id: 0x10
        description: "Set erg number by hardware address"
        request:
          - { name: "hw_address", bytes: 4, type: "uint32_be", description: "HW address (MSB first, unit serial #)" }
          - { name: "erg_number", bytes: 1, type: "uint8", description: "Erg Number (Logical Address)" }

      PM_SET_COMMUNICATIONSTATE:
        id: 0x11
        description: "Set communication state (not implemented)"
        status: "not_implemented"

      PM_SET_CMDUPLIST:
        id: 0x12
        description: "Set command upload list (not implemented)"
        status: "not_implemented"

      PM_SET_SCREENSTATE:
        id: 0x13
        description: >
          Set screen state.  Processed asynchronously by the UI task — poll
          PM_GET_SCREENSTATESTATUS (0x86) for completion.
        request:
          - { name: "screen_type", bytes: 1, type: "uint8", description: "Screen Type (see enums.yaml)" }
          - { name: "screen_value", bytes: 1, type: "uint8", description: "Screen Value (see enums.yaml)" }
        cross_ref:
          - "c2bluetooth commands.dart — CsafePMSetScreenState (0x13)"

      PM_CONFIGURE_WORKOUT:
        id: 0x14
        description: "Configure workout programming mode (enable/disable)"
        request:
          - name: "programming_mode"
            bytes: 1
            type: "uint8"
            description: "Programming mode (0=Disable, 1=Enable)"
        cross_ref:
          - "c2bluetooth commands.dart — CsafePMConfigureWorkout (0x14)"

      PM_SET_TARGETAVGWATTS:
        id: 0x15
        description: "Set target average watts"
        request:
          - { name: "avg_watts", bytes: 2, type: "uint16_be", description: "Avg Watts (MSB first)" }

      PM_SET_TARGETCALSPERHR:
        id: 0x16
        description: "Set target calories per hour"
        request:
          - { name: "cals_per_hr", bytes: 2, type: "uint16_be", description: "Cals/Hr (MSB first)" }

      PM_SET_INTERVALTYPE:
        id: 0x17
        description: "Set interval type"
        request:
          - name: "interval_type"
            bytes: 1
            type: "uint8"
            description: >
              Interval Type: 0=Time, 1=Distance, 2=Rest,
              3=Time w/ Undefined Rest, 4=Distance w/ Undefined Rest,
              5=Undefined Rest, 6=Calorie, 7=Calorie w/ Undefined Rest,
              8=WattMinute, 9=WattMinute w/ Undefined Rest
        cross_ref:
          - "c2bluetooth commands.dart — CsafePMSetIntervalType (0x17)"

      PM_SET_WORKOUTINTERVALCOUNT:
        id: 0x18
        description: "Set workout interval count"
        request:
          - { name: "interval_count", bytes: 1, type: "uint8", description: "Interval Count" }
        cross_ref:
          - "c2bluetooth commands.dart — CsafePMSetWorkoutIntervalCount (0x18)"

      PM_SET_DISPLAYUPDATERATE:
        id: 0x19
        description: "Set display update rate"
        request:
          - { name: "update_rate", bytes: 1, type: "uint8", description: "Display Update Rate" }

      PM_SET_AUTHENPASSWORD:
        id: 0x1A
        description: "Set authentication password"
        request:
          - { name: "hw_address", bytes: 4, type: "uint32_be", description: "HW address (MSB first)" }
          - { name: "password", bytes: 8, type: "bytes", description: "Authentication Password (MSB first, 8 bytes)" }
        response:
          - { name: "result", bytes: 1, type: "uint8", description: "Result" }

      PM_SET_TICKTIME:
        id: 0x1B
        description: "Set tick time"
        request:
          - { name: "tick_time", bytes: 4, type: "uint32_be", description: "Tick Time (MSB first)" }

      PM_SET_TICKTIMEOFFSET:
        id: 0x1C
        description: "Set tick time offset"
        request:
          - { name: "tick_time_offset", bytes: 4, type: "uint32_be", description: "Tick Time Offset (MSB first)" }

      PM_SET_RACEDATASAMPLETICKS:
        id: 0x1D
        description: "Set race data sample tick interval"
        request:
          - { name: "sample_tick", bytes: 4, type: "uint32_be", description: "Sample Tick (MSB first)" }

      PM_SET_RACEOPERATIONTYPE:
        id: 0x1E
        description: >
          Set race operation type.  If set to anything other than
          RACEOPERATIONTYPE_DISABLE, extended frame addressing is required.
        request:
          - { name: "operation_type", bytes: 1, type: "uint8", description: "Type (see enums.yaml)" }

      PM_SET_RACESTATUSDISPLAYTICKS:
        id: 0x1F
        description: "Set race status display tick interval"
        request:
          - { name: "display_tick", bytes: 4, type: "uint32_be", description: "Display Tick (MSB first)" }

      PM_SET_RACESTATUSWARNINGTICKS:
        id: 0x20
        description: "Set race status warning tick interval"
        request:
          - { name: "warning_tick", bytes: 4, type: "uint32_be", description: "Warning Tick (MSB first)" }

      PM_SET_RACEIDLEMODEPARAMS:
        id: 0x21
        description: "Set race idle mode parameters"
        request:
          - { name: "doze_seconds", bytes: 2, type: "uint16_be", description: "Doze Sec (MSB first)" }
          - { name: "sleep_seconds", bytes: 2, type: "uint16_be", description: "Sleep Sec (MSB first)" }
          - { name: "unused", bytes: 4, type: "bytes", description: "Unused (4 bytes)" }

      PM_SET_DATETIME:
        id: 0x22
        description: "Set date and time on the PM"
        request:
          - { name: "hours", bytes: 1, type: "uint8", description: "Time Hours (1-12)" }
          - { name: "minutes", bytes: 1, type: "uint8", description: "Time Minutes (0-59)" }
          - { name: "meridiem", bytes: 1, type: "uint8", description: "Time Meridiem (0=AM, 1=PM)" }
          - { name: "month", bytes: 1, type: "uint8", description: "Date Month (1-12)" }
          - { name: "day", bytes: 1, type: "uint8", description: "Date Day (1-31)" }
          - { name: "year", bytes: 2, type: "uint16_be", description: "Date Year (MSB first)" }

      PM_SET_LANGUAGETYPE:
        id: 0x23
        description: "Set language type"
        request:
          - { name: "language_type", bytes: 1, type: "uint8", description: "Language Type" }

      PM_SET_WIFICONFIG:
        id: 0x24
        description: "Set WiFi configuration"
        request:
          - { name: "config_index", bytes: 1, type: "uint8", description: "Config Index" }
          - { name: "wep_mode", bytes: 1, type: "uint8", description: "WEP Mode" }

      PM_SET_CPUTICKRATE:
        id: 0x25
        description: "Set CPU/Tick rate"
        request:
          - { name: "cpu_tick_rate", bytes: 1, type: "uint8", description: "CPU/Tick Rate" }

      PM_SET_LOGCARDUSER:
        id: 0x26
        description: "Set logcard user number"
        request:
          - { name: "user_number", bytes: 1, type: "uint8", description: "Logcard User #" }

      PM_SET_SCREENERRORMODE:
        id: 0x27
        description: "Set screen error mode"
        request:
          - { name: "mode", bytes: 1, type: "uint8", description: "Mode (disable/enable)" }

      PM_SET_CABLETEST:
        id: 0x28
        description: "Set cable test mode (PM3/PM4 only, not for PC use)"
        request:
          - { name: "mode", bytes: 1, type: "uint8", description: "Mode (disable/enable)" }
          - { name: "dummy_data", bytes: 79, type: "bytes", description: "Dummy Data (79 bytes)" }

      PM_SET_USER_ID:
        id: 0x29
        description: "Set user ID"
        request:
          - { name: "user_number", bytes: 1, type: "uint8", description: "User Number" }
          - { name: "user_id", bytes: 4, type: "uint32_be", description: "User ID (MSB first)" }

      PM_SET_USER_PROFILE:
        id: 0x2A
        description: "Set user profile"
        request:
          - { name: "user_number", bytes: 1, type: "uint8", description: "User Number" }
          - { name: "user_weight", bytes: 2, type: "uint16_be", description: "User Weight (MSB first)" }
          - { name: "dob_day", bytes: 1, type: "uint8", description: "User DOB Day" }
          - { name: "dob_month", bytes: 1, type: "uint8", description: "User DOB Month" }
          - { name: "dob_year", bytes: 2, type: "uint16_be", description: "User DOB Year (MSB first)" }
          - { name: "gender", bytes: 1, type: "uint8", description: "User Gender" }

      PM_SET_HRM:
        id: 0x2B
        description: "Set heart rate monitor device info"
        request:
          - { name: "mfg_id", bytes: 1, type: "uint8", description: "Device Manufacture ID" }
          - { name: "device_type", bytes: 1, type: "uint8", description: "Device Type" }
          - { name: "device_num", bytes: 2, type: "uint16_be", description: "Device Num (MSB first)" }

      PM_SET_RACESTARTINGPHYSICALADDRESS:
        id: 0x2C
        description: "Set race starting physical address"
        request:
          - { name: "first_erg_address", bytes: 1, type: "uint8", description: "Physical Address of First Erg In Race" }

      PM_SET_HRBELT_INFO:
        id: 0x2D
        description: "Set HR belt info for a user"
        request:
          - { name: "user_number", bytes: 1, type: "uint8", description: "User Number" }
          - { name: "mfg_id", bytes: 1, type: "uint8", description: "Mfg ID" }
          - { name: "device_type", bytes: 1, type: "uint8", description: "Device Type" }
          - { name: "belt_id", bytes: 2, type: "uint16_be", description: "Belt ID (MSB first)" }

      # Note: 0x2E is not listed in the spec

      PM_SET_SENSOR_CHANNEL:
        id: 0x2F
        description: "Set sensor channel"
        request:
          - { name: "rf_frequency", bytes: 1, type: "uint8", description: "RF Frequency" }
          - { name: "rf_period_hz", bytes: 2, type: "uint16_be", description: "RF Period Hz (MSB first)" }
          - { name: "datapage_pattern", bytes: 1, type: "uint8", description: "Datapage Pattern" }
          - { name: "activity_timeout", bytes: 1, type: "uint8", description: "Activity Timeout" }

  # =========================================================================
  #  LONG SET DATA (0x30–0x3E)
  #  Wrapper: CSAFE_SETPMDATA_CMD (0x77)
  #  These are long commands — require command data.
  # =========================================================================
  long_set_data:
    description: "Long proprietary set data commands"
    wrapper: "CSAFE_SETPMDATA_CMD"
    spec_page: "72-75"
    commands:

      PM_SET_TEAM_DISTANCE:
        id: 0x30
        description: "Set team distance (not implemented)"
        status: "not_implemented"

      PM_SET_TEAM_FINISH_TIME:
        id: 0x31
        description: "Set team finish time (not implemented)"
        status: "not_implemented"

      PM_SET_RACEPARTICIPANT:
        id: 0x32
        description: "Set race participant info (name is null-terminated, max 16 chars)"
        request:
          - { name: "racer_id", bytes: 1, type: "uint8", description: "Racer ID (Erg physical address)" }
          - { name: "racer_name", bytes: 17, type: "string", description: "Racer Name (null-terminated, max 16 chars + null)" }

      PM_SET_RACESTATUS:
        id: 0x33
        description: "Set race status for up to 4 racers plus team distance"
        request:
          - { name: "racer1_id", bytes: 1, type: "uint8", description: "First Racer ID" }
          - { name: "racer1_position", bytes: 1, type: "uint8", description: "First Racer Position" }
          - { name: "racer1_delta", bytes: 4, type: "uint32_be", description: "First Racer Delta Distance/Time (MSB first)" }
          - { name: "racer2_id", bytes: 1, type: "uint8", description: "2nd Racer ID" }
          - { name: "racer2_position", bytes: 1, type: "uint8", description: "2nd Racer Position" }
          - { name: "racer2_delta", bytes: 4, type: "uint32_be", description: "2nd Racer Delta Distance/Time (MSB first)" }
          - { name: "racer3_id", bytes: 1, type: "uint8", description: "3rd Racer ID" }
          - { name: "racer3_position", bytes: 1, type: "uint8", description: "3rd Racer Position" }
          - { name: "racer3_delta", bytes: 4, type: "uint32_be", description: "3rd Racer Delta Distance/Time (MSB first)" }
          - { name: "racer4_id", bytes: 1, type: "uint8", description: "4th Racer ID" }
          - { name: "racer4_position", bytes: 1, type: "uint8", description: "4th Racer Position" }
          - { name: "racer4_delta", bytes: 4, type: "uint32_be", description: "4th Racer Delta Distance/Time (MSB first)" }
          - { name: "team_distance", bytes: 4, type: "uint32_be", description: "Team Distance (MSB first)" }
          - { name: "mode", bytes: 1, type: "uint8", description: "Mode" }

      PM_SET_LOGCARD_MEMORY:
        id: 0x34
        description: "Write logcard memory block (max 64 bytes)"
        request:
          - { name: "start_address", bytes: 4, type: "uint32_be", description: "Start address (MSB first)" }
          - { name: "block_length", bytes: 1, type: "uint8", description: "Block length (max 64)" }
          - { name: "data", bytes: 64, type: "bytes", description: "Data to set (up to 64 bytes)" }
        response:
          - { name: "bytes_written", bytes: 1, type: "uint8", description: "Bytes written" }

      PM_SET_DISPLAYSTRING:
        id: 0x35
        description: "Set display string (up to 32 characters)"
        request:
          - { name: "characters", bytes: 32, type: "string", description: "Characters (up to 32)" }

      PM_SET_DISPLAYBITMAP:
        id: 0x36
        description: "Set display bitmap (max 64 data bytes per block)"
        request:
          - { name: "bitmap_index", bytes: 2, type: "uint16_be", description: "Bitmap index (MSB first)" }
          - { name: "block_length", bytes: 1, type: "uint8", description: "Block length" }
          - { name: "data", bytes: 64, type: "bytes", description: "Bitmap data (up to 64 bytes)" }
        response:
          - { name: "total_bitmap_bytes", bytes: 2, type: "uint16_be", description: "Total bitmap bytes (MSB first)" }

      PM_SET_LOCALRACEPARTICIPANT:
        id: 0x37
        description: >
          Set local race participant.  Only available for firmware that
          supports PC-less racing.
        request:
          - { name: "race_type", bytes: 1, type: "uint8", description: "Race Type" }
          - { name: "race_length", bytes: 4, type: "uint32_be", description: "Race Length (MSB first)" }
          - { name: "race_participants", bytes: 1, type: "uint8", description: "Race Participants" }
          - { name: "race_state", bytes: 1, type: "uint8", description: "Race State" }
          - { name: "race_lane", bytes: 1, type: "uint8", description: "Race Lane" }

      PM_SET_GAMEPARAMS:
        id: 0x38
        description: "Set game parameters (type, durations, targets)"
        request:
          - { name: "game_type_id", bytes: 1, type: "uint8", description: "Game Type ID" }
          - { name: "workout_duration_time", bytes: 4, type: "uint32_be", description: "Workout Duration Time (MSB first)" }
          - { name: "split_duration_time", bytes: 4, type: "uint32_be", description: "Split Duration Time (MSB first)" }
          - { name: "target_pace_time", bytes: 4, type: "uint32_be", description: "Target Pace Time (MSB first)" }
          - { name: "target_avg_watts", bytes: 4, type: "uint32_be", description: "Target Avg Watts (MSB first)" }
          - { name: "target_cals_per_hr", bytes: 4, type: "uint32_be", description: "Target Cals Per Hour (MSB first)" }
          - { name: "target_stroke_rate", bytes: 1, type: "uint8", description: "Target Stroke Rate" }

      PM_SET_EXTENDED_HRBELT_INFO:
        id: 0x39
        description: "Set extended HR belt info (4-byte belt ID)"
        request:
          - { name: "unused", bytes: 1, type: "uint8", description: "Unused" }
          - { name: "mfg_id", bytes: 1, type: "uint8", description: "HRM mfg id" }
          - { name: "device_type", bytes: 1, type: "uint8", description: "HRM device type" }
          - { name: "belt_id", bytes: 4, type: "uint32_be", description: "HRM belt id (MSB first)" }

      PM_SET_EXTENDED_HRM:
        id: 0x3A
        description: "Set extended HRM device info (4-byte belt ID)"
        request:
          - { name: "mfg_id", bytes: 1, type: "uint8", description: "HRM mfg id" }
          - { name: "device_type", bytes: 1, type: "uint8", description: "HRM device type" }
          - { name: "belt_id", bytes: 4, type: "uint32_be", description: "HRM belt id (MSB first)" }

      PM_SET_LEDBACKLIGHT:
        id: 0x3B
        description: "Set LED backlight state and intensity"
        request:
          - { name: "state", bytes: 1, type: "uint8", description: "State (enable/disable)" }
          - { name: "intensity", bytes: 1, type: "uint8", description: "Intensity (0-100%)" }

      PM_SET_DIAGLOG_RECORD_ARCHIVE:
        id: 0x3C
        description: "Archive diagnostic log record (65535 archives all)"
        request:
          - { name: "record_type", bytes: 1, type: "uint8", description: "Record Type (Enum)" }
          - { name: "record_index", bytes: 2, type: "uint16_be", description: "Record Index (MSB first; 65535 archives all)" }

      PM_SET_WIRELESS_CHANNEL_CONFIG:
        id: 0x3D
        description: "Set wireless channel configuration bitmask"
        request:
          - { name: "channel_bitmask", bytes: 4, type: "uint32_be", description: "Wireless channel bit mask (MSB first)" }

      PM_SET_RACECONTROLPARAMS:
        id: 0x3E
        description: "Set race control parameters"
        request:
          - { name: "undefined_rest_transition_time", bytes: 2, type: "uint16_be", description: "Undefined rest to work transition time, 1sec LSB (MSB first)" }
          - { name: "undefined_rest_interval", bytes: 2, type: "uint16_be", description: "Undefined rest interval, 1sec LSB (MSB first)" }
          - { name: "race_prompt_bitmap_duration", bytes: 4, type: "uint32_be", description: "Race prompt bitmap display duration, 1sec LSB (MSB first)" }
          - { name: "time_cap_duration", bytes: 4, type: "uint32_be", description: "Time Cap duration, 1sec LSB (MSB first)" }

# ===========================================================================
#  Reserved / Internal IDs within the proprietary range
# ===========================================================================
reserved_ids:
  - { id: 0x73, description: "Internal use" }
  - { id: 0x74, description: "Internal use" }
  - { id: 0x75, description: "Internal use" }
  - { id: 0x76, description: "Command wrapper — CSAFE_SETPMCFG_CMD" }
  - { id: 0x77, description: "Command wrapper — CSAFE_SETPMDATA_CMD" }
  - { id: 0x7E, description: "Command wrapper — CSAFE_GETPMCFG_CMD" }
  - { id: 0x7F, description: "Command wrapper — CSAFE_GETPMDATA_CMD" }
