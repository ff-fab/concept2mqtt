# PM5 BLE GATT Services and Characteristics
# Source: Concept2 PM CSAFE Communication Definition, Rev 0.25 (2023-03-23)
# Section: Link Layer Definition, Table 14 — BLE GATT Attribute Table (pp13-29)

base_uuid: "CE06XXXX-43E5-11E4-916C-0800200C9A66"
# Replace XXXX with the 4-digit hex suffix for each service/characteristic.

# Standard BLE GATT infrastructure (included for completeness, not C2-specific)
standard_gatt:
  cccd:
    uuid: "0x2902"
    name: "Client Characteristic Configuration Descriptor"
    bytes: 2
    permissions: ["READ", "WRITE"]
    description: >
      Write 01:00 to enable notifications, 00:00 to disable.
      Required for all NOTIFY characteristics below.
  peripheral_preferred_connection_parameters:
    uuid: "0x2A04"
    name: "Peripheral Preferred Connection Parameters"
    bytes: 8
    permissions: ["READ"]
    description: >
      30ms min/max connection interval, 0 slave latency,
      10000ms supervision timeout.
  gatt_service:
    uuid: "0x1801"
    name: "GATT Service"
    permissions: ["READ"]
    description: "Mandatory GATT service."
  service_changed:
    uuid: "0x2A05"
    name: "Service Changed"
    permissions: []
    description: "Service changed characteristic (null value)."

services:
  # ---------------------------------------------------------------------------
  # Device Information Service
  # ---------------------------------------------------------------------------
  device_information:
    uuid_suffix: "0x0010"
    name: "C2 Device Information Service"
    description: "Device identification and version information."
    # Cross-ref: c2bluetooth constants.dart — C2_DEVICE_INFO_SERVICE_UUID
    # Cross-ref: pROWess main.py — PM5UUID['getSerial'] uses 0x0012

    characteristics:
      model_number:
        uuid_suffix: "0x0011"
        name: "Model Number String"
        bytes: 16
        permissions: ["READ"]
        description: 'Model number string (e.g. "PM5").'
        firmware_versions:
          - "PM5 V150 – V199.99"
          - "PM5 V204 – V299.99"
        data_format:
          fields:
            - name: model_number
              offset: 0
              length: 16
              type: utf8
              description: "Model number string, null-padded."
        # Cross-ref: c2bluetooth constants.dart — (commented, line 40: CE060010)

      serial_number:
        uuid_suffix: "0x0012"
        name: "Serial Number String"
        bytes: 9
        permissions: ["READ"]
        description: "PM serial number string."
        data_format:
          fields:
            - name: serial_number
              offset: 0
              length: 9
              type: utf8
              description: "Serial number string."
        # Cross-ref: c2bluetooth constants.dart — (commented, line 41: CE060012)
        # Cross-ref: pROWess main.py — PM5UUID['getSerial'] (line 225)

      hardware_revision:
        uuid_suffix: "0x0013"
        name: "Hardware Revision String"
        bytes: 3
        permissions: ["READ"]
        description: "Hardware revision string."
        data_format:
          fields:
            - name: hardware_revision
              offset: 0
              length: 3
              type: utf8
              description: "Hardware revision string."
        # Cross-ref: c2bluetooth constants.dart — (commented, line 42: CE060013)

      firmware_revision:
        uuid_suffix: "0x0014"
        name: "Firmware Revision String"
        bytes: 20
        permissions: ["READ"]
        description: "Firmware revision string."
        data_format:
          fields:
            - name: firmware_revision
              offset: 0
              length: 20
              type: utf8
              description: "Firmware revision string."
        # Cross-ref: c2bluetooth constants.dart — (commented, line 43: CE060014)

      manufacturer_name:
        uuid_suffix: "0x0015"
        name: "Manufacturer Name String"
        bytes: 16
        permissions: ["READ"]
        description: 'Manufacturer name string ("Concept2").'
        data_format:
          fields:
            - name: manufacturer_name
              offset: 0
              length: 16
              type: utf8
              description: 'Fixed value "Concept2", null-padded.'
        # Cross-ref: c2bluetooth constants.dart — (commented, line 44: CE060015)

      erg_machine_type:
        uuid_suffix: "0x0016"
        name: "Erg Machine Type"
        bytes: 1
        permissions: ["READ"]
        description: "Connected erg machine type (enumerated value, see Appendix)."
        firmware_versions:
          - "PM5 V150 – V199.99"
          - "PM5 V204 – V299.99"
        data_format:
          fields:
            - name: erg_machine_type
              offset: 0
              length: 1
              type: uint8
              description: "Erg Machine Type enum value."

      att_mtu:
        uuid_suffix: "0x0017"
        name: "ATT MTU"
        bytes: 2
        permissions: ["READ"]
        description: "ATT Rx MTU size (23–512 bytes)."
        firmware_versions:
          - "PM5 V168.050 – V199.99"
          - "PM5 V204.006 – V299.99"
        data_format:
          fields:
            - name: att_rx_mtu
              offset: 0
              length: 2
              type: uint16_le
              description: "ATT Rx MTU in bytes."

      ll_dle:
        uuid_suffix: "0x0018"
        name: "LL DLE"
        bytes: 2
        permissions: ["READ"]
        description: "LL Max Tx/Rx Bytes (27–251 bytes)."
        firmware_versions:
          - "PM5 V168.050 – V199.99"
          - "PM5 V204.006 – V299.99"
        data_format:
          fields:
            - name: ll_max_tx_rx_bytes
              offset: 0
              length: 2
              type: uint16_le
              description: "Link Layer Data Extension max Tx/Rx bytes."

  # ---------------------------------------------------------------------------
  # PM Control Service
  # ---------------------------------------------------------------------------
  pm_control:
    uuid_suffix: "0x0020"
    name: "C2 PM Control Service"
    description: "CSAFE command send/receive channel."
    # Cross-ref: c2bluetooth constants.dart — C2_ROWING_CONTROL_SERVICE_UUID (line 11)

    characteristics:
      receive:
        uuid_suffix: "0x0021"
        name: "C2 PM Receive Characteristic"
        bytes: 20
        bytes_note: "Up to 20 bytes"
        permissions: ["WRITE"]
        description: "Control command in the form of a CSAFE frame sent to PM."
        data_format:
          fields:
            - name: csafe_frame
              offset: 0
              length: 20
              type: bytes
              description: "CSAFE command frame (variable length, up to 20 bytes)."
        # Cross-ref: c2bluetooth constants.dart — C2_ROWING_PM_RECEIVE_CHARACTERISTIC_UUID (line 14)
        # Cross-ref: pROWess main.py — PM5UUID['sendCSAFE'] (line 226)

      transmit:
        uuid_suffix: "0x0022"
        name: "C2 PM Transmit Characteristic"
        bytes: 20
        bytes_note: "Up to 20 bytes"
        permissions: ["READ"]
        description: "Response to command in the form of a CSAFE frame from the PM."
        data_format:
          fields:
            - name: csafe_frame
              offset: 0
              length: 20
              type: bytes
              description: "CSAFE response frame (variable length, up to 20 bytes)."
        # Cross-ref: c2bluetooth constants.dart — C2_ROWING_PM_TRANSMIT_CHARACTERISTIC_UUID (line 17)
        # Cross-ref: pROWess main.py — PM5UUID['getCSAFE'] (line 227)

  # ---------------------------------------------------------------------------
  # Rowing Service
  # ---------------------------------------------------------------------------
  rowing:
    uuid_suffix: "0x0030"
    name: "C2 Rowing Service"
    description: "Real-time rowing data and workout status notifications."
    # Cross-ref: c2bluetooth constants.dart — C2_ROWING_PRIMARY_SERVICE_UUID (line 19)

    characteristics:
      general_status:
        uuid_suffix: "0x0031"
        name: "C2 Rowing General Status"
        bytes: 19
        permissions: ["NOTIFY"]
        description: >
          General rowing status: elapsed time, distance, workout/interval/rowing/stroke
          state, total work distance, duration, drag factor.
        data_format:
          # pROWess struct: '<HBHBBBBBBHBHBBB' (19 bytes)
          fields:
            - name: elapsed_time_lo
              offset: 0
              length: 1
              type: uint8
              unit: "0.01 s"
              description: "Elapsed time low byte (0.01 sec LSB)."
            - name: elapsed_time_mid
              offset: 1
              length: 1
              type: uint8
              description: "Elapsed time mid byte."
            - name: elapsed_time_hi
              offset: 2
              length: 1
              type: uint8
              description: "Elapsed time high byte."
            - name: distance_lo
              offset: 3
              length: 1
              type: uint8
              unit: "0.1 m"
              description: "Distance low byte (0.1 m LSB)."
            - name: distance_mid
              offset: 4
              length: 1
              type: uint8
              description: "Distance mid byte."
            - name: distance_hi
              offset: 5
              length: 1
              type: uint8
              description: "Distance high byte."
            - name: workout_type
              offset: 6
              length: 1
              type: uint8
              csafe_cmd: CSAFE_PM_GET_WORKOUTTYPE
              description: "Workout Type enum (see Appendix)."
            - name: interval_type
              offset: 7
              length: 1
              type: uint8
              csafe_cmd: CSAFE_PM_GET_INTERVALTYPE
              description: "Interval Type enum (see Appendix). Changes based on work/rest phase."
            - name: workout_state
              offset: 8
              length: 1
              type: uint8
              csafe_cmd: CSAFE_PM_GET_WORKOUTSTATE
              description: "Workout State enum (see Appendix)."
            - name: rowing_state
              offset: 9
              length: 1
              type: uint8
              csafe_cmd: CSAFE_PM_GET_ROWINGSTATE
              description: "Rowing State enum (see Appendix)."
            - name: stroke_state
              offset: 10
              length: 1
              type: uint8
              csafe_cmd: CSAFE_PM_GET_STROKESTATE
              description: "Stroke State enum (see Appendix)."
            - name: total_work_distance_lo
              offset: 11
              length: 1
              type: uint8
              unit: "0.1 m"
              description: "Total work distance low byte."
            - name: total_work_distance_mid
              offset: 12
              length: 1
              type: uint8
              description: "Total work distance mid byte."
            - name: total_work_distance_hi
              offset: 13
              length: 1
              type: uint8
              description: "Total work distance high byte."
            - name: workout_duration_lo
              offset: 14
              length: 1
              type: uint8
              description: "Workout duration low byte."
            - name: workout_duration_mid
              offset: 15
              length: 1
              type: uint8
              description: "Workout duration mid byte."
            - name: workout_duration_hi
              offset: 16
              length: 1
              type: uint8
              description: "Workout duration high byte."
            - name: workout_duration_type
              offset: 17
              length: 1
              type: uint8
              description: "Duration type (time or distance)."
            - name: drag_factor
              offset: 18
              length: 1
              type: uint8
              description: "Drag factor."
        # Cross-ref: c2bluetooth constants.dart — C2_ROWING_GENERAL_STATUS_CHARACTERISTIC_UUID (line 22)
        # Cross-ref: pROWess main.py — PM5UUID['RowStatus'] (line 228)
        # Cross-ref: pROWess main.py — decodeRowingStatus() struct '<HBHBBBBBBHBHBBB' (line 167)

      additional_status_1:
        uuid_suffix: "0x0032"
        name: "C2 Rowing Additional Status 1"
        bytes: 17
        permissions: ["NOTIFY"]
        description: >
          Additional rowing status: speed, stroke rate, heart rate, pace,
          rest distance/time, erg machine type.
        data_format:
          # pROWess struct: '<HBHBBHHHBHB' (17 bytes)
          fields:
            - name: elapsed_time_lo
              offset: 0
              length: 1
              type: uint8
              unit: "0.01 s"
              description: "Elapsed time low byte (0.01 sec LSB)."
            - name: elapsed_time_mid
              offset: 1
              length: 1
              type: uint8
              description: "Elapsed time mid byte."
            - name: elapsed_time_hi
              offset: 2
              length: 1
              type: uint8
              description: "Elapsed time high byte."
            - name: speed_lo
              offset: 3
              length: 1
              type: uint8
              unit: "0.001 m/s"
              csafe_cmd: CSAFE_GETSPEED_CMD
              description: "Speed low byte (0.001 m/s LSB)."
            - name: speed_hi
              offset: 4
              length: 1
              type: uint8
              description: "Speed high byte."
            - name: stroke_rate
              offset: 5
              length: 1
              type: uint8
              unit: "strokes/min"
              csafe_cmd: CSAFE_PM_GET_STROKERATE
              description: "Stroke rate in strokes per minute."
            - name: heartrate
              offset: 6
              length: 1
              type: uint8
              unit: "bpm"
              csafe_cmd: CSAFE_PM_GET_AVG_HEARTRATE
              description: "Heart rate in bpm (255 = invalid)."
            - name: current_pace_lo
              offset: 7
              length: 1
              type: uint8
              unit: "0.01 s"
              csafe_cmd: CSAFE_PM_GET_STROKE_500MPACE
              description: "Current pace low byte (0.01 sec LSB per 500m)."
            - name: current_pace_hi
              offset: 8
              length: 1
              type: uint8
              description: "Current pace high byte."
            - name: average_pace_lo
              offset: 9
              length: 1
              type: uint8
              unit: "0.01 s"
              csafe_cmd: CSAFE_PM_GET_TOTAL_AVG_500MPACE
              description: "Average pace low byte (0.01 sec LSB per 500m)."
            - name: average_pace_hi
              offset: 10
              length: 1
              type: uint8
              description: "Average pace high byte."
            - name: rest_distance_lo
              offset: 11
              length: 1
              type: uint8
              csafe_cmd: CSAFE_PM_GET_RESTDISTANCE
              description: "Rest distance low byte."
            - name: rest_distance_hi
              offset: 12
              length: 1
              type: uint8
              description: "Rest distance high byte."
            - name: rest_time_lo
              offset: 13
              length: 1
              type: uint8
              unit: "0.01 s"
              csafe_cmd: CSAFE_PM_GET_RESTTIME
              description: "Rest time low byte (0.01 sec LSB)."
            - name: rest_time_mid
              offset: 14
              length: 1
              type: uint8
              description: "Rest time mid byte."
            - name: rest_time_hi
              offset: 15
              length: 1
              type: uint8
              description: "Rest time high byte."
            - name: erg_machine_type
              offset: 16
              length: 1
              type: uint8
              description: "Erg Machine Type enum (see Appendix)."
        # Cross-ref: c2bluetooth constants.dart — C2_ROWING_GENERAL_STATUS_CHARACTERISTIC2_UUID (line 25)
        # Cross-ref: pROWess main.py — PM5UUID['RowStatus1'] (line 229)
        # Cross-ref: pROWess main.py — decodeRowingStatus1() struct '<HBHBBHHHBHB' (line 187)
        # Cross-ref: pROWess main.py — updateRowingStatus1() struct '<HBHBBHHHBHB' (line 206)

      additional_status_2:
        uuid_suffix: "0x0033"
        name: "C2 Rowing Additional Status 2"
        bytes: 20
        permissions: ["NOTIFY"]
        description: >
          Interval/split averages: power, calories, pace, last split time/distance.
        data_format:
          fields:
            - name: elapsed_time_lo
              offset: 0
              length: 1
              type: uint8
              unit: "0.01 s"
              description: "Elapsed time low byte (0.01 sec LSB)."
            - name: elapsed_time_mid
              offset: 1
              length: 1
              type: uint8
              description: "Elapsed time mid byte."
            - name: elapsed_time_hi
              offset: 2
              length: 1
              type: uint8
              description: "Elapsed time high byte."
            - name: interval_count
              offset: 3
              length: 1
              type: uint8
              csafe_cmd: CSAFE_PM_GET_WORKOUTINTERVALCOUNT
              description: "Workout interval count."
            - name: average_power_lo
              offset: 4
              length: 1
              type: uint8
              unit: watts
              csafe_cmd: CSAFE_PM_GET_TOTAL_AVG_POWER
              description: "Average power low byte."
            - name: average_power_hi
              offset: 5
              length: 1
              type: uint8
              description: "Average power high byte."
            - name: total_calories_lo
              offset: 6
              length: 1
              type: uint8
              unit: cals
              csafe_cmd: CSAFE_PM_GET_TOTAL_AVG_CALORIES
              description: "Total calories low byte."
            - name: total_calories_hi
              offset: 7
              length: 1
              type: uint8
              description: "Total calories high byte."
            - name: split_avg_pace_lo
              offset: 8
              length: 1
              type: uint8
              unit: "0.01 s"
              csafe_cmd: CSAFE_PM_GET_SPLIT_AVG_500MPACE
              description: "Split/interval avg pace low byte (0.01 sec LSB per 500m)."
            - name: split_avg_pace_hi
              offset: 9
              length: 1
              type: uint8
              description: "Split/interval avg pace high byte."
            - name: split_avg_power_lo
              offset: 10
              length: 1
              type: uint8
              unit: watts
              csafe_cmd: CSAFE_PM_GET_SPLIT_AVG_POWER
              description: "Split/interval avg power low byte."
            - name: split_avg_power_hi
              offset: 11
              length: 1
              type: uint8
              description: "Split/interval avg power high byte."
            - name: split_avg_calories_lo
              offset: 12
              length: 1
              type: uint8
              unit: "cals/hr"
              csafe_cmd: CSAFE_PM_GET_SPLIT_AVG_CALORIES
              description: "Split/interval avg calories low byte (cals/hr)."
            - name: split_avg_calories_hi
              offset: 13
              length: 1
              type: uint8
              description: "Split/interval avg calories high byte."
            - name: last_split_time_lo
              offset: 14
              length: 1
              type: uint8
              unit: "0.1 s"
              csafe_cmd: CSAFE_PM_GET_LAST_SPLITTIME
              description: "Last split time low byte (0.1 sec LSB)."
            - name: last_split_time_mid
              offset: 15
              length: 1
              type: uint8
              description: "Last split time mid byte."
            - name: last_split_time_hi
              offset: 16
              length: 1
              type: uint8
              description: "Last split time high byte."
            - name: last_split_distance_lo
              offset: 17
              length: 1
              type: uint8
              unit: meters
              csafe_cmd: CSAFE_PM_GET_LAST_SPLITDISTANCE
              description: "Last split distance low byte (meters)."
            - name: last_split_distance_mid
              offset: 18
              length: 1
              type: uint8
              description: "Last split distance mid byte."
            - name: last_split_distance_hi
              offset: 19
              length: 1
              type: uint8
              description: "Last split distance high byte."

      sample_rate:
        uuid_suffix: "0x0034"
        name: "C2 Rowing General Status and Additional Status Sample Rate"
        bytes: 1
        permissions: ["WRITE", "READ"]
        description: >
          Controls notification rate for general status and additional status data.
        data_format:
          fields:
            - name: rate
              offset: 0
              length: 1
              type: uint8
              description: >
                0 = 1 sec, 1 = 500 ms (default if not explicitly set),
                2 = 250 ms, 3 = 100 ms.

      stroke_data:
        uuid_suffix: "0x0035"
        name: "C2 Rowing Stroke Data"
        bytes: 20
        permissions: ["NOTIFY"]
        description: >
          Per-stroke metrics: drive length/time, recovery time, stroke distance,
          peak/average drive force, work per stroke, stroke count.
        data_format:
          # CSAFE_PM_GET_STROKESTATS returns equivalent values
          fields:
            - name: elapsed_time_lo
              offset: 0
              length: 1
              type: uint8
              unit: "0.01 s"
              description: "Elapsed time low byte (0.01 sec LSB)."
            - name: elapsed_time_mid
              offset: 1
              length: 1
              type: uint8
              description: "Elapsed time mid byte."
            - name: elapsed_time_hi
              offset: 2
              length: 1
              type: uint8
              description: "Elapsed time high byte."
            - name: distance_lo
              offset: 3
              length: 1
              type: uint8
              unit: "0.1 m"
              description: "Distance low byte (0.1 m LSB)."
            - name: distance_mid
              offset: 4
              length: 1
              type: uint8
              description: "Distance mid byte."
            - name: distance_hi
              offset: 5
              length: 1
              type: uint8
              description: "Distance high byte."
            - name: drive_length
              offset: 6
              length: 1
              type: uint8
              unit: "0.01 m"
              csafe_cmd: CSAFE_PM_GET_STROKESTATS
              description: "Drive length (0.01 meters, max 2.55 m)."
            - name: drive_time
              offset: 7
              length: 1
              type: uint8
              unit: "0.01 s"
              csafe_cmd: CSAFE_PM_GET_STROKESTATS
              description: "Drive time (0.01 sec, max 2.55 sec)."
            - name: stroke_recovery_time_lo
              offset: 8
              length: 1
              type: uint8
              unit: "0.01 s"
              csafe_cmd: CSAFE_PM_GET_STROKESTATS
              description: "Stroke recovery time low byte (0.01 sec, max 655.35 sec)."
            - name: stroke_recovery_time_hi
              offset: 9
              length: 1
              type: uint8
              description: "Stroke recovery time high byte."
            - name: stroke_distance_lo
              offset: 10
              length: 1
              type: uint8
              unit: "0.01 m"
              csafe_cmd: CSAFE_PM_GET_STROKESTATS
              description: "Stroke distance low byte (0.01 m, max 655.35 m)."
            - name: stroke_distance_hi
              offset: 11
              length: 1
              type: uint8
              description: "Stroke distance high byte."
            - name: peak_drive_force_lo
              offset: 12
              length: 1
              type: uint8
              unit: "0.1 lbs"
              csafe_cmd: CSAFE_PM_GET_STROKESTATS
              description: "Peak drive force low byte (0.1 lbs, max 6553.5 lbs)."
            - name: peak_drive_force_hi
              offset: 13
              length: 1
              type: uint8
              description: "Peak drive force high byte."
            - name: average_drive_force_lo
              offset: 14
              length: 1
              type: uint8
              unit: "0.1 lbs"
              csafe_cmd: CSAFE_PM_GET_STROKESTATS
              description: "Average drive force low byte (0.1 lbs, max 6553.5 lbs)."
            - name: average_drive_force_hi
              offset: 15
              length: 1
              type: uint8
              description: "Average drive force high byte."
            - name: work_per_stroke_lo
              offset: 16
              length: 1
              type: uint8
              unit: "0.1 J"
              csafe_cmd: CSAFE_PM_GET_STROKESTATS
              description: "Work per stroke low byte (0.1 Joules, max 6553.5 J)."
            - name: work_per_stroke_hi
              offset: 17
              length: 1
              type: uint8
              description: "Work per stroke high byte."
            - name: stroke_count_lo
              offset: 18
              length: 1
              type: uint8
              csafe_cmd: CSAFE_PM_GET_STROKESTATS
              description: "Stroke count low byte."
            - name: stroke_count_hi
              offset: 19
              length: 1
              type: uint8
              description: "Stroke count high byte."

      additional_stroke_data:
        uuid_suffix: "0x0036"
        name: "C2 Rowing Additional Stroke Data"
        bytes: 15
        permissions: ["NOTIFY"]
        description: >
          Additional per-stroke data: stroke power, calories, projected work time
          and distance.
        data_format:
          fields:
            - name: elapsed_time_lo
              offset: 0
              length: 1
              type: uint8
              unit: "0.01 s"
              description: "Elapsed time low byte (0.01 sec LSB)."
            - name: elapsed_time_mid
              offset: 1
              length: 1
              type: uint8
              description: "Elapsed time mid byte."
            - name: elapsed_time_hi
              offset: 2
              length: 1
              type: uint8
              description: "Elapsed time high byte."
            - name: stroke_power_lo
              offset: 3
              length: 1
              type: uint8
              unit: watts
              csafe_cmd: CSAFE_PM_GET_STROKE_POWER
              description: "Stroke power low byte."
            - name: stroke_power_hi
              offset: 4
              length: 1
              type: uint8
              description: "Stroke power high byte."
            - name: stroke_calories_lo
              offset: 5
              length: 1
              type: uint8
              unit: "cal/hr"
              csafe_cmd: CSAFE_PM_GET_STROKE_CALORICBURNRATE
              description: "Stroke caloric burn rate low byte (cal/hr)."
            - name: stroke_calories_hi
              offset: 6
              length: 1
              type: uint8
              description: "Stroke caloric burn rate high byte."
            - name: stroke_count_lo
              offset: 7
              length: 1
              type: uint8
              csafe_cmd: CSAFE_PM_GET_STROKESTATS
              description: "Stroke count low byte."
            - name: stroke_count_hi
              offset: 8
              length: 1
              type: uint8
              description: "Stroke count high byte."
            - name: projected_work_time_lo
              offset: 9
              length: 1
              type: uint8
              unit: seconds
