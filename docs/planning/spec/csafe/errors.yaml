# PM5 Error Codes
# Source: Concept2 PM CSAFE Communication Definition, Rev 0.25 (2023-03-23)
# Section: Appendix D — Error Code List (pp110-160)
#
# Error display format on PM: <Error Code> - <Screen Number>
#
# NOTE: Some error names appear twice in the spec with different values.
# These represent the same logical error on different PM hardware versions:
#   - Lower range (~1-2600): PM3/PM4 era error codes
#   - Higher range (~10000-12000): PM5/nRF52-based error codes
# Duplicate-value entries are suffixed with __V2 in this file.
# Entries with identical values across both occurrences are deduplicated.

