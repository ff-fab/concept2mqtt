  # ---------------------------------------------------------------------------
  # Workout Duration Type (p95)
  # ---------------------------------------------------------------------------
  DurationType:
    description: "Workout duration identifier types (bitmask in high bits of duration field)"
    spec_name: "DurationTypes"
    # DISCREPANCY (CONFIRMED BUG in c2bluetooth Dart code):
    # Spec defines:  TIME=0x00, CALORIES=0x40, DISTANCE=0x80, WATTMIN=0xC0
    # Dart maps:     TIME=0x00, DISTANCE=0x40, CALORIES=0x80, WATTMIN=0xC0
    # The Dart extension swaps CALORIES and DISTANCE values!
    # The Dart enum comments say CALORIES=0x40 (matching spec), but the
    # extension map contradicts the comments and has them reversed.
    # Trust the spec — CALORIES=0x40, DISTANCE=0x80.
    values:
      TIME: 0          # 0x00 — duration in 0.01 sec LSB
      CALORIES: 64     # 0x40 — duration in 1 cal LSB
      DISTANCE: 128    # 0x80 — duration in 1 meter LSB
      WATTMIN: 192     # 0xC0 — duration in watt-minutes

