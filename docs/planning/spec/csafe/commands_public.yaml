    # -----------------------------------------------------------------------
    #  Capabilities command
    # -----------------------------------------------------------------------
    CSAFE_GETCAPS_CMD:
      id: 0x70
      description: "Get device capabilities"
      category: "identification"
      request:
        data_bytes: 1
        fields:
          - name: "capability_code"
            byte: 0
            type: "uint8"
            description: "Capability code to query (0x00, 0x01, or 0x02)"
      response:
        data_bytes: variable
        capability_codes:
          0x00:
            description: "Frame capabilities"
            fields:
              - name: "max_rx_frame"
                byte: 0
                type: "uint8"
                description: "Maximum receive frame size"
              - name: "max_tx_frame"
                byte: 1
                type: "uint8"
                description: "Maximum transmit frame size"
              - name: "min_interframe"
                byte: 2
                type: "uint8"
                description: "Minimum interframe gap"
          0x01:
            description: "Capability set 1"
            fields:
              - name: "byte_0"
                byte: 0
                type: "uint8"
                value: 0x00
              - name: "byte_1"
                byte: 1
                type: "uint8"
                value: 0x00
          0x02:
            description: "Capability set 2"
            fields:
              - name: "bytes"
                bytes: [0, 10]
                type: "uint8"
                count: 11
                value: 0x00
                description: "All bytes return 0x00"
      cross_ref: {}

