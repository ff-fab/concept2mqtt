# Concept2 Proprietary CSAFE Commands
# Source: Concept2 PM CSAFE Communication Definition, Rev 0.25 (2023-03-23)
# Section: Command List — Proprietary CSAFE Commands (pp57-75)
#
# Cross-reference files:
#   - docs/planning/spec/csafe/protocol.yaml — frame format, command structure
#   - docs/planning/spec/csafe/enums.yaml — enumerated types referenced by commands
#   - docs/planning/spec/csafe/ble_services.yaml — BLE GATT transport layer
#   - docs/planning/spec/csafe/commands_public.yaml — public commands that interact
#
# All proprietary commands are issued inside one of the wrapper commands listed
# below.  The wrapper carries a list of proprietary sub-commands encoded with
# standard CSAFE long-command structure (command byte + byte count + data).
#
# Special considerations (pp56-57):
#   - ScreenType commands are posted asynchronously to the UI task; poll
#     CSAFE_PM_GET_SCREENSTATESTATUS for completion (PENDING → INPROGRESS →
#     INACTIVE).
#   - Maximum block size commands (DISPLAYBITMAP, LOGCARDMEMORY): 64 bytes max.
#   - Fixed response size commands (MEMORY, LOGCARDMEMORY, INTERNALLOGMEMORY):
#     always return 65 bytes; first byte is valid count.
#   - FORCEPLOTDATA and HEARTBEATDATA: 32-byte (16-word) max block; returns 33
#     bytes with first byte indicating valid byte count.

# ===========================================================================
#  Wrapper Commands
# ===========================================================================
# These are the public-facing command IDs that encapsulate proprietary
# sub-commands within a standard CSAFE frame.  Each wrapper targets a
# specific category of proprietary commands.
wrappers:
  CSAFE_SETUSERCFG1_CMD:
    id: 0x1A
    type: long
    access: "public_limited"
    direction: set
    description: >
      Limited proprietary access through the public command interface.
      Only certain long_set_config commands are permitted (e.g.,
      PM_SET_SPLITDURATION).  Used by pROWess programPhase().
    categories: ["long_set_config"]
    cross_ref:
      - "pROWess/py/main.py:300 — 0x1A wraps PM_SET_SPLITDURATION"

  CSAFE_SETPMCFG_CMD:
    id: 0x76
    type: long
    access: "proprietary"
    direction: set
    description: >
      Full proprietary set-configuration wrapper.  Carries one or more
      long_set_config sub-commands.
    categories: ["long_set_config"]
    cross_ref:
      - "c2bluetooth commands.dart — C2ProprietaryWrapper uses 0x76"

  CSAFE_SETPMDATA_CMD:
    id: 0x77
    type: long
    access: "proprietary"
    direction: set
    description: >
      Full proprietary set-data wrapper.  Carries long_set_data sub-commands.
    categories: ["long_set_data"]

  CSAFE_GETPMCFG_CMD:
    id: 0x7E
    type: long
    access: "proprietary"
    direction: get
    description: >
      Full proprietary get-configuration wrapper.  Carries short_get_config
      and long_get_config sub-commands.
    categories: ["short_get_config", "long_get_config"]

  CSAFE_GETPMDATA_CMD:
    id: 0x7F
    type: long
    access: "proprietary"
    direction: get
    description: >
      Full proprietary get-data wrapper.  Carries short_get_data and
      long_get_data sub-commands.
    categories: ["short_get_data", "long_get_data"]

# ===========================================================================
#  Proprietary Commands — organised by category
# ===========================================================================
commands:

  # =========================================================================
  #  SHORT GET CONFIGURATION (0x80–0x9F, 0xE8–0xEF)
  #  Wrapper: CSAFE_GETPMCFG_CMD (0x7E)
  #  These are short commands (no request data).
  # =========================================================================
  short_get_config:
    description: "Short proprietary get configuration commands"
    wrapper: "CSAFE_GETPMCFG_CMD"
    spec_page: "57-59"
    commands:

      PM_GET_FW_VERSION:
        id: 0x80
        description: "Firmware executable version number"
        response:
          - { name: "fw_version", bytes: 16, type: "bytes", description: "FW Exe Version # (MSB first, 16 bytes)" }

      PM_GET_HW_VERSION:
        id: 0x81
        description: "Hardware version number"
        response:
          - { name: "hw_version", bytes: 16, type: "bytes", description: "HW Version # (MSB first, 16 bytes)" }

      PM_GET_HW_ADDRESS:
        id: 0x82
        description: "Hardware address (unit serial number from MFG EEPROM)"
        response:
          - { name: "hw_address", bytes: 4, type: "uint32_be", description: "HW address (MSB first)" }

      PM_GET_TICK_TIMEBASE:
        id: 0x83
        description: "Tick timebase as IEEE 754 float"
        response:
          - { name: "tick_timebase", bytes: 4, type: "float32_be", description: "Tick timebase (float, MSB first)" }

      PM_GET_HRM:
        id: 0x84
        description: "Heart rate monitor channel status and device info"
        response:
          - { name: "channel_status", bytes: 1, type: "uint8", description: "0=Inactive, 1=Discovery, 2=Paired" }
          - { name: "mfg_id", bytes: 1, type: "uint8", description: "Device Manufacture ID (if paired, else 0)" }
          - { name: "device_type", bytes: 1, type: "uint8", description: "Device Type (if paired, else 0)" }
          - { name: "device_num", bytes: 2, type: "uint16_be", description: "Device Num (if paired, else 0)" }

      PM_GET_DATETIME:
        id: 0x85
        description: "Current date and time on the PM"
        response:
          - { name: "hours", bytes: 1, type: "uint8", description: "Time Hours (1-12)" }
          - { name: "minutes", bytes: 1, type: "uint8", description: "Time Minutes (0-59)" }
          - { name: "meridiem", bytes: 1, type: "uint8", description: "Time Meridiem (0=AM, 1=PM)" }
          - { name: "month", bytes: 1, type: "uint8", description: "Date Month (1-12)" }
          - { name: "day", bytes: 1, type: "uint8", description: "Date Day (1-31)" }
          - { name: "year", bytes: 2, type: "uint16_be", description: "Date Year (MSB first)" }

      PM_GET_SCREENSTATESTATUS:
        id: 0x86
        description: >
          Screen state status — used to poll for completion of ScreenType
          commands (PENDING → INPROGRESS → INACTIVE).
        response:
          - { name: "screen_type", bytes: 1, type: "uint8", description: "Screen type" }
          - { name: "screen_value", bytes: 1, type: "uint8", description: "Screen value" }
          - { name: "screen_status", bytes: 1, type: "uint8", description: "Screen status (see enums)" }

      PM_GET_RACE_LANE_REQUEST:
        id: 0x87
        description: "Erg physical address for race lane request"
        response:
          - { name: "erg_physical_address", bytes: 1, type: "uint8", description: "Erg Physical Address" }

      PM_GET_RACE_ENTRY_REQUEST:
        id: 0x88
        description: "Erg logical address for race entry request"
        response:
          - { name: "erg_logical_address", bytes: 1, type: "uint8", description: "Erg Logical Address" }

      PM_GET_WORKOUTTYPE:
        id: 0x89
        description: "Current workout type"
        response:
          - { name: "workout_type", bytes: 1, type: "uint8", description: "Workout type (see enums.yaml OBJ_WORKOUTTYPE_T)" }

      PM_GET_DISPLAYTYPE:
        id: 0x8A
        description: "Current display type"
        response:
          - { name: "display_type", bytes: 1, type: "uint8", description: "Display type" }

      PM_GET_DISPLAYUNITS:
        id: 0x8B
        description: "Current display units"
        response:
          - { name: "display_units", bytes: 1, type: "uint8", description: "Display units" }

      PM_GET_LANGUAGETYPE:
        id: 0x8C
        description: "Current language type"
        response:
          - { name: "language_type", bytes: 1, type: "uint8", description: "Language type" }

      PM_GET_WORKOUTSTATE:
        id: 0x8D
        description: "Current workout state"
        response:
          - { name: "workout_state", bytes: 1, type: "uint8", description: "Workout state (see enums.yaml)" }

      PM_GET_INTERVALTYPE:
        id: 0x8E
        description: "Current interval type — changes depending on work/rest phase"
        response:
          - { name: "interval_type", bytes: 1, type: "uint8", description: "Interval type (see enums.yaml)" }

      PM_GET_OPERATIONALSTATE:
        id: 0x8F
        description: "Current operational state of the PM"
        response:
          - { name: "operational_state", bytes: 1, type: "uint8", description: "Operational state" }

      PM_GET_LOGCARDSTATE:
        id: 0x90
        description: "Log card state"
        response:
          - { name: "logcard_state", bytes: 1, type: "uint8", description: "Log card state" }

      PM_GET_LOGCARDSTATUS:
        id: 0x91
        description: "Log card status"
        response:
          - { name: "logcard_status", bytes: 1, type: "uint8", description: "Log card status" }

      PM_GET_POWERUPSTATE:
        id: 0x92
        description: "Power-up state"
        response:
          - { name: "powerup_state", bytes: 1, type: "uint8", description: "Power-up state" }

      PM_GET_ROWINGSTATE:
        id: 0x93
        description: "Current rowing state"
        response:
          - { name: "rowing_state", bytes: 1, type: "uint8", description: "Rowing state (see enums.yaml)" }

      PM_GET_SCREENCONTENT_VERSION:
        id: 0x94
        description: "Screen content version number"
        response:
          - { name: "screen_content_version", bytes: 16, type: "bytes", description: "Screen Content Version # (MSB first, 16 bytes)" }

      PM_GET_COMMUNICATIONSTATE:
        id: 0x95
        description: "Communication state"
        response:
          - { name: "communication_state", bytes: 1, type: "uint8", description: "Communication state" }

      PM_GET_RACEPARTICIPANTCOUNT:
        id: 0x96
        description: "Number of race participants"
        response:
          - { name: "participant_count", bytes: 1, type: "uint8", description: "Race Participant Count" }

      PM_GET_BATTERYLEVELPERCENT:
        id: 0x97
        description: "Battery level as percentage"
        response:
          - { name: "battery_percent", bytes: 1, type: "uint8", description: "Battery Level Percent" }

      PM_GET_RACEMODESTATUS:
        id: 0x98
        description: "Race mode status including HW address, state, and diagnostics"
        response:
          - { name: "hw_address", bytes: 4, type: "uint32_be", description: "HW address (MSB first)" }
          - { name: "race_operation_type", bytes: 1, type: "uint8", description: "Race Operation Type" }
          - { name: "race_state", bytes: 1, type: "uint8", description: "Race State" }
          - { name: "race_start_state", bytes: 1, type: "uint8", description: "Race Start State" }
          - { name: "rowing_state", bytes: 1, type: "uint8", description: "Rowing State" }
          - { name: "epm_status", bytes: 1, type: "uint8", description: "EPM Status" }
          - { name: "battery_percent", bytes: 1, type: "uint8", description: "Battery Level Percent" }
          - { name: "pm5_tach_wire_test", bytes: 1, type: "uint8", description: "PM5: Tach wire test status (PM3/4: Avg Flywheel RPM MSB)" }
          - { name: "pm5_tach_simulator", bytes: 1, type: "uint8", description: "PM5: Tach Simulator status (PM3/4: Avg Flywheel RPM LSB)" }
          - { name: "workout_state", bytes: 1, type: "uint8", description: "Workout State" }
          - { name: "workout_type", bytes: 1, type: "uint8", description: "Workout Type" }
          - { name: "operational_state", bytes: 1, type: "uint8", description: "Operational State" }

      PM_GET_INTERNALLOGPARAMS:
        id: 0x99
        description: "Internal log parameters (start address and last entry length)"
        response:
          - { name: "log_start_address", bytes: 4, type: "uint32_be", description: "Log Start Address (MSB first)" }
          - { name: "last_entry_length", bytes: 2, type: "uint16_be", description: "Last Log Entry Length (MSB first)" }

      PM_GET_PRODUCTCONFIGURATION:
        id: 0x9A
        description: "Product configuration (base HW/SW revision, build, LCD info)"
        response:
          - { name: "base_hw_revision", bytes: 2, type: "uint16_be", description: "PM Base HW Revision" }
          - { name: "base_sw_revision", bytes: 2, type: "uint16_be", description: "PM Base SW Revision" }
          - { name: "sw_build_number", bytes: 1, type: "uint8", description: "SW Build Number" }
          - { name: "lcd_mfg_id", bytes: 1, type: "uint8", description: "LCD Mfg ID" }
          - { name: "unused", bytes: 4, type: "bytes", description: "Unused (0)" }

      PM_GET_ERGSLAVEDISCOVERYREQUESTSTATUS:
        id: 0x9B
        description: "Erg slave discovery request status"
        response:
          - { name: "status", bytes: 1, type: "uint8", description: "Status" }
          - { name: "slave_count", bytes: 1, type: "uint8", description: "# of Erg slaves present" }

      PM_GET_WIFICONFIG:
        id: 0x9C
        description: "WiFi configuration"
        response:
          - { name: "config_index", bytes: 1, type: "uint8", description: "Configuration Index" }
          - { name: "wep_mode", bytes: 1, type: "uint8", description: "WEP Mode" }

      PM_GET_CPUTICKRATE:
        id: 0x9D
        description: "CPU/Tick rate enumeration"
        response:
          - { name: "cpu_tick_rate", bytes: 1, type: "uint8", description: "CPU/Tick Rate Enumeration" }

      PM_GET_LOGCARDUSERCENSUS:
        id: 0x9E
        description: "Log card user census"
        response:
          - { name: "user_count", bytes: 1, type: "uint8", description: "Number Users on Card" }
          - { name: "current_user", bytes: 1, type: "uint8", description: "Number of Current User" }

      PM_GET_WORKOUTINTERVALCOUNT:
        id: 0x9F
        description: "Workout interval count"
        response:
          - { name: "interval_count", bytes: 1, type: "uint8", description: "Workout Interval Count" }

      # --- Extended range (0xE8–0xEF) ---

      PM_GET_WORKOUTDURATION:
        id: 0xE8
        description: "Workout duration with type indicator"
        response:
          - name: "duration_type"
            bytes: 1
            type: "uint8"
            description: >
              Time/Distance duration type:
              0x00=Time, 0x40=Calories, 0x80=Distance, 0xC0=Watt-Min
          - { name: "duration", bytes: 4, type: "uint32_be", description: "Duration value (MSB first)" }

      PM_GET_WORKOTHER:
        id: 0xE9
        description: "Work other value"
        response:
          - { name: "work_other", bytes: 4, type: "uint32_be", description: "Work Other (MSB first)" }

      PM_GET_EXTENDED_HRM:
        id: 0xEA
        description: "Extended heart rate monitor info"
        response:
          - { name: "channel_status", bytes: 1, type: "uint8", description: "HRM Channel Status" }
          - { name: "mfg_id", bytes: 1, type: "uint8", description: "HRM manufacturer ID" }
          - { name: "device_type", bytes: 1, type: "uint8", description: "HRM device type" }
          - { name: "device_number", bytes: 4, type: "uint32_be", description: "HRM device number (MSB first)" }

      PM_GET_DEFCALIBRATIONVERIFIED:
        id: 0xEB
        description: "Drag factor calibration verified status"
        response:
          - { name: "verified_status", bytes: 1, type: "uint8", description: "DF Calibration Verified Status" }

      PM_GET_FLYWHEELSPEED:
        id: 0xEC
        description: "Flywheel speed in RPM"
        response:
          - { name: "flywheel_speed_rpm", bytes: 2, type: "uint16_be", description: "Flywheel speed, rpm (MSB first)" }

      PM_GET_ERGMACHINETYPE:
        id: 0xED
        description: "Erg machine type"
        response:
          - { name: "erg_machine_type", bytes: 1, type: "uint8", description: "Erg machine type (see enums.yaml)" }

      PM_GET_RACE_BEGINEND_TICKCOUNT:
        id: 0xEE
        description: "Race begin and end tick counts"
        response:
          - { name: "race_begin_tick", bytes: 4, type: "uint32_be", description: "Race begin tick time (MSB first)" }
          - { name: "race_end_tick", bytes: 4, type: "uint32_be", description: "Race end tick time (MSB first)" }

      PM_GET_PM5_FWUPDATESTATUS:
        id: 0xEF
        description: "PM5 firmware update status"
        response:
          - { name: "update_info_type", bytes: 2, type: "uint16_be", description: "Update info type (MSB first)" }
          - { name: "update_status", bytes: 2, type: "uint16_be", description: "Update status (MSB first)" }

  # =========================================================================
  #  LONG GET CONFIGURATION (0x50–0x58)
  #  Wrapper: CSAFE_GETPMCFG_CMD (0x7E)
  #  These are long commands — require command data to produce a response.
  # =========================================================================
  long_get_config:
    description: "Long proprietary get configuration commands"
    wrapper: "CSAFE_GETPMCFG_CMD"
    spec_page: "60-61"
    commands:

      PM_GET_ERG_NUMBER:
        id: 0x50
        description: "Get erg number by hardware address"
        request:
          - { name: "hw_address", bytes: 4, type: "uint32_be", description: "HW address (unit serial #)" }
        response:
          - { name: "erg_number", bytes: 1, type: "uint8", description: "Erg #" }

      PM_GET_ERGNUMBERREQUEST:
        id: 0x51
        description: "Get erg number request — maps logical to physical address"
        request:
          - { name: "logical_erg_number", bytes: 1, type: "uint8", description: "Logical Erg Number Requested" }
        response:
          - { name: "physical_erg_number", bytes: 1, type: "uint8", description: "Physical Erg # Requested" }
          - { name: "hw_address", bytes: 4, type: "uint32_be", description: "HW address (MSB first)" }
          - { name: "logical_erg_number", bytes: 1, type: "uint8", description: "Physical Erg #" }

      PM_GET_USERIDSTRING:
        id: 0x52
        description: "Get user ID string by user number"
        request:
          - { name: "user_number", bytes: 1, type: "uint8", description: "User Number" }
        response:
          - { name: "user_id", bytes: 10, type: "bytes", description: "User ID (MSB first, up to 10 bytes)" }

      PM_GET_LOCALRACEPARTICIPANT:
        id: 0x53
        description: >
          Get local race participant info.  Only available for firmware that
          supports PC-less racing.
        request:
          - { name: "hw_address", bytes: 4, type: "uint32_be", description: "HW address (MSB first)" }
          - { name: "user_id_string", bytes: 6, type: "bytes", description: "UserID String (MSB first)" }
          - { name: "machine_type", bytes: 1, type: "uint8", description: "Machine type" }
        response:
          - { name: "race_type", bytes: 1, type: "uint8", description: "Race Type" }
          - { name: "race_length", bytes: 4, type: "uint32_be", description: "Race Length (MSB first)" }
          - { name: "race_participants", bytes: 1, type: "uint8", description: "Race Participants" }
          - { name: "race_state", bytes: 1, type: "uint8", description: "Race State" }

      PM_GET_USER_ID:
        id: 0x54
        description: "Get user ID by user number"
        request:
          - { name: "user_number", bytes: 1, type: "uint8", description: "User Number" }
        response:
          - { name: "user_number", bytes: 1, type: "uint8", description: "User Number" }
          - { name: "user_id", bytes: 4, type: "uint32_be", description: "User ID (MSB first)" }

      PM_GET_USER_PROFILE:
        id: 0x55
        description: "Get user profile by user number"
        request:
          - { name: "user_number", bytes: 1, type: "uint8", description: "User Number" }
        response:
          - { name: "user_number", bytes: 1, type: "uint8", description: "User Number" }
          - { name: "user_weight", bytes: 2, type: "uint16_be", description: "User Weight (MSB first)" }
          - { name: "dob_day", bytes: 1, type: "uint8", description: "User DOB Day" }
          - { name: "dob_month", bytes: 1, type: "uint8", description: "User DOB Month" }
          - { name: "dob_year", bytes: 2, type: "uint16_be", description: "User DOB Year (MSB first)" }
          - { name: "gender", bytes: 1, type: "uint8", description: "User Gender" }

      PM_GET_HRBELT_INFO:
        id: 0x56
        description: "Get HR belt info by user number"
        request:
          - { name: "user_number", bytes: 1, type: "uint8", description: "User Number" }
        response:
          - { name: "user_number", bytes: 1, type: "uint8", description: "User Number" }
          - { name: "mfg_id", bytes: 1, type: "uint8", description: "Mfg ID" }
          - { name: "device_type", bytes: 1, type: "uint8", description: "Device Type" }
          - { name: "belt_id", bytes: 2, type: "uint16_be", description: "Belt ID (MSB first)" }

      PM_GET_EXTENDED_HRBELT_INFO:
        id: 0x57
        description: "Get extended HR belt info (4-byte belt ID) by user number"
        request:
          - { name: "user_number", bytes: 1, type: "uint8", description: "User Number" }
        response:
          - { name: "user_number", bytes: 1, type: "uint8", description: "User Number" }
          - { name: "mfg_id", bytes: 1, type: "uint8", description: "Mfg ID" }
          - { name: "device_type", bytes: 1, type: "uint8", description: "Device Type" }
          - { name: "belt_id", bytes: 4, type: "uint32_be", description: "Belt ID (MSB first, 4 bytes)" }

      PM_GET_CURRENT_LOG_STRUCTURE:
        id: 0x58
        description: "Get current log structure by structure ID and split/interval number"
        request:
          - { name: "structure_id", bytes: 1, type: "uint8", description: "Structure ID enumeration" }
          - { name: "split_interval_number", bytes: 1, type: "uint8", description: "Split/interval number (1-M)" }
        response:
          - { name: "structure_id", bytes: 1, type: "uint8", description: "Structure ID enumeration" }
          - { name: "split_interval_number", bytes: 1, type: "uint8", description: "Split/interval number" }
          - { name: "bytes_read", bytes: 1, type: "uint8", description: "Bytes read" }
          - { name: "data", bytes: "variable", type: "bytes", description: "Data read (1st through Nth byte)" }

  # =========================================================================
  #  SHORT GET DATA (0xA0–0xCF)
  #  Wrapper: CSAFE_GETPMDATA_CMD (0x7F)
  #  These are short commands (no request data).
  # =========================================================================
  short_get_data:
    description: "Short proprietary get data commands"
    wrapper: "CSAFE_GETPMDATA_CMD"
    spec_page: "62-64"
    commands:

      PM_GET_WORKTIME:
        id: 0xA0
        description: "Current work time"
        response:
          - { name: "work_time", bytes: 4, type: "uint32_be", description: "Work Time (MSB first)" }

      PM_GET_PROJECTED_WORKTIME:
        id: 0xA1
        description: "Projected work time"
        response:
          - { name: "projected_work_time", bytes: 4, type: "uint32_be", description: "Projected Work Time (MSB first)" }

      PM_GET_TOTAL_RESTTIME:
        id: 0xA2
        description: "Total rest time"
        response:
          - { name: "total_rest_time", bytes: 4, type: "uint32_be", description: "Total Rest Time (MSB first)" }

      PM_GET_WORKDISTANCE:
        id: 0xA3
        description: "Current work distance"
        response:
          - { name: "work_distance", bytes: 4, type: "uint32_be", description: "Work Distance (MSB first)" }

      PM_GET_TOTAL_WORKDISTANCE:
        id: 0xA4
        description: "Total work distance"
        response:
          - { name: "total_work_distance", bytes: 4, type: "uint32_be", description: "Total Work Distance (MSB first)" }

      PM_GET_PROJECTED_WORKDISTANCE:
        id: 0xA5
        description: "Projected work distance"
        response:
          - { name: "projected_work_distance", bytes: 4, type: "uint32_be", description: "Projected Work Distance (MSB first)" }

      PM_GET_RESTDISTANCE:
        id: 0xA6
        description: "Current rest distance"
        response:
          - { name: "rest_distance", bytes: 2, type: "uint16_be", description: "Rest Distance (MSB first)" }

      PM_GET_TOTAL_RESTDISTANCE:
        id: 0xA7
        description: "Total rest distance"
        response:
          - { name: "total_rest_distance", bytes: 4, type: "uint32_be", description: "Total Rest Distance (MSB first)" }

      PM_GET_STROKE_500MPACE:
        id: 0xA8
        description: "Current stroke pace per 500m"
        response:
          - { name: "pace_500m", bytes: 4, type: "uint32_be", description: "Pace / 500m (MSB first)" }

      PM_GET_STROKE_POWER:
        id: 0xA9
        description: "Current stroke power in watts"
        response:
          - { name: "stroke_watts", bytes: 4, type: "uint32_be", description: "Stroke Watts (MSB first)" }

      PM_GET_STROKE_CALORICBURNRATE:
        id: 0xAA
