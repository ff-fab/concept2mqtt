            description: "Stroke pace (LSB)"
          - name: "pace_msb"
            byte: 1
            type: "uint8"
            description: "Stroke pace (MSB)"
          - name: "units_specifier"
            byte: 2
            type: "uint8"
            description: "Units specifier"
      cross_ref: {}

    CSAFE_GETCADENCE_CMD:
      id: 0xA7
      description: "Get current stroke rate (cadence)"
      category: "workout_data"
      request:
        data_bytes: 0
      response:
        data_bytes: 3
        fields:
          - name: "stroke_rate_lsb"
            byte: 0
            type: "uint8"
            description: "Stroke rate (LSB)"
          - name: "stroke_rate_msb"
            byte: 1
            type: "uint8"
            description: "Stroke rate (MSB)"
          - name: "units_specifier"
            byte: 2
            type: "uint8"
            description: "Units specifier"
      cross_ref: {}

    CSAFE_GETGRADE_CMD:
