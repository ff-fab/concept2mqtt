              description: "RR interval low byte (BT HRM value)."
            - name: rr_interval_hi
              offset: 4
              length: 1
              type: uint8
              description: "RR interval high byte (BT HRM value)."
            - name: hr_value_lo
              offset: 5
              length: 1
              type: uint8
              description: "HR value low byte (BT HRM value)."
            - name: hr_value_hi
              offset: 6
              length: 1
              type: uint8
              description: "HR value high byte (BT HRM value)."
            - name: status_flags
              offset: 7
              length: 1
              type: uint8
              description: "Status flags (BT HRM value)."
            - name: hr_measurement_lo
              offset: 8
              length: 1
              type: uint8
              description: "HR measurement low byte (ANT HRM value)."
