# PM5 CSAFE Enumerated Types
# Source: Concept2 PM CSAFE Communication Definition, Rev 0.25 (2023-03-23)
# Section: Appendix A — Enumerated Type Definitions (pp93-103)
#
# Each enum maps symbolic names to their integer wire-protocol values.
# Values are decimal unless noted. Hex equivalents in comments where useful.
#
# Cross-reference: docs/legacy/examples/c2bluetooth/lib/enums.dart
# Discrepancies between the spec and the Dart implementation are flagged
# with "DISCREPANCY" comments.

enums:

  # ---------------------------------------------------------------------------
  # Operational State (p93)
  # ---------------------------------------------------------------------------
  OperationalState:
    description: "PM operational states"
    spec_name: "OBJ_OPERATIONALSTATE_T"
    # Not implemented in c2bluetooth Dart code
    values:
      RESET: 0
      READY: 1
      WORKOUT: 2
      WARMUP: 3
      RACE: 4
      POWEROFF: 5
      PAUSE: 6
      INVOKEBOOTLOADER: 7
      POWEROFF_SHIP: 8
      IDLE_CHARGE: 9
      IDLE: 10
      MFGTEST: 11
      FWUPDATE: 12
      DRAGFACTOR: 13
      DFCALIBRATION: 100  # 0x64 — drag factor calibration

  # ---------------------------------------------------------------------------
  # Erg Model Type (p93)
  # ---------------------------------------------------------------------------
  ErgModelType:
    description: "Ergometer model types (D/E, C/B, A)"
    spec_name: "OBJ_ERGMODELTYPE_T"
    # Not implemented in c2bluetooth Dart code
    values:
      TYPE_D: 0   # Model D/E
      TYPE_C: 1   # Model C/B
      TYPE_A: 2   # Model A

  # ---------------------------------------------------------------------------
  # Erg Machine Type (pp93-94)
  # ---------------------------------------------------------------------------
  ErgMachineType:
    description: "Ergometer machine types"
    spec_name: "OBJ_ERGMACHINETYPE_T"
    # DISCREPANCY: The spec starts at 0 (STATIC_D=0, STATIC_C=1, STATIC_A=2,
    # STATIC_B=3) but the Dart code starts at 1 (STATIC_D=1, STATIC_C=2,
    # STATIC_A=3, STATIC_B=4). Values from STATIC_E (5) onward agree.
    # Also: spec uses LINKED_DYNAMIC, Dart uses SLIDES_DYNAMIC (both = 32).
    # Also: spec comment for STATIC_DYNO says "(32)" but the explicit
    # assignment is = 64 — the comment is a typo in the spec.
    values:
      STATIC_D: 0              # Model D, static
      STATIC_C: 1              # Model C, static
      STATIC_A: 2              # Model A, static
      STATIC_B: 3              # Model B, static
      STATIC_E: 5              # Model E, static
      STATIC_SIMULATOR: 7      # Rower simulator
      STATIC_DYNAMIC: 8        # Dynamic, static
      SLIDES_A: 16             # 0x10 — Model A, slides
      SLIDES_B: 17             # 0x11 — Model B, slides
      SLIDES_C: 18             # 0x12 — Model C, slides
      SLIDES_D: 19             # 0x13 — Model D, slides
      SLIDES_E: 20             # 0x14 — Model E, slides
      LINKED_DYNAMIC: 32       # 0x20 — Dynamic, linked
      STATIC_DYNO: 64          # 0x40 — Dynamometer, static
      STATIC_SKI: 128          # 0x80 — Ski Erg, static
      STATIC_SKI_SIMULATOR: 143  # 0x8F — Ski simulator
      BIKE: 192                # 0xC0 — Bike, no arms
      BIKE_ARMS: 193           # 0xC1 — Bike, arms
      BIKE_NOARMS: 194         # 0xC2 — Bike, no arms
      BIKE_SIMULATOR: 207      # 0xCF — Bike simulator
      MULTIERG_ROW: 224        # 0xE0 — Multi-erg row
      MULTIERG_SKI: 225        # 0xE1 — Multi-erg ski
      MULTIERG_BIKE: 226       # 0xE2 — Multi-erg bike
      NUM: 227                 # 0xE3 — Number of machine types

